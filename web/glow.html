<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tactus — live fret-glow annotation</title>
<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<!--
  THEME: "SHERBET" — playful arcade-pop. Display = Fredoka, body = Nunito.
  -------------------------------------------------------------------------------------------
  LIVE AR ANNOTATION ON THE REAL NECK. Camera ALWAYS ON, the stage background.
  AUTO: Python backend (software/ai/vision/fretboard_server.py: YOLO-World + SAM2 on the M4
   Pro GPU) detects the neck + streams a smoothed quad over WebSocket (ws://localhost:8770).
   - Only the first NUM_FRETS frets (nut end) are drawn, sized to the GRID cell (not the
     viewport) so the UI always fits the neck. Incoming detections are EMA-smoothed — slow,
     so it tracks without jitter.
   - "⇄ flip" fixes orientation. MANUAL fallback: "✥ drag mode" → drag the 4 dots; saved.
  Per note, ON the (string,fret) spot: a glowing rounded rect (color=string, deep+frame=strum).
-->
<style>
  :root{ --ivory:#FFFBF6; --ink:#3A2A4A; --gold:#FF4D8D; --line:#FBD9E6;
         --peach:#FFE3D1; --mint:#D6F7E6; --lav:#E7DBFF; --grape:#AD7FFF;
         --berry:#FF4D8D; --tangy:#FF9F43; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:
      radial-gradient(900px 620px at 8% -6%, var(--peach) 0%, rgba(255,227,209,0) 60%),
      radial-gradient(820px 640px at 102% 14%, var(--lav) 0%, rgba(231,219,255,0) 58%),
      radial-gradient(1000px 780px at 88% 108%, var(--mint) 0%, rgba(214,247,230,0) 60%),
      radial-gradient(760px 560px at 18% 112%, #FFE9F1 0%, rgba(255,233,241,0) 62%),
      #FFFBF6;
      font-family:'Nunito',-apple-system,Segoe UI,sans-serif;color:var(--ink)}
  #app{display:grid;grid-template-columns:340px 1fr;height:100vh}
  .score{background:linear-gradient(180deg,#FFFFFFF2,#FFF6FBF2);border-right:3px solid var(--line);display:flex;flex-direction:column;overflow:hidden;box-shadow:6px 0 28px #ff4d8d14}
  .score h1{font-family:'Fredoka','Nunito';font-weight:700;font-size:19px;margin:0;padding:16px 18px 6px;letter-spacing:-.2px}
  .score h1 b{color:var(--berry)}
  .score .sub{font-size:12px;font-weight:700;padding:0 18px 12px;color:#A88BC4;border-bottom:3px solid var(--line)}
  .rows{flex:1;overflow:auto;padding:8px}
  .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:16px;margin-bottom:6px}
  .row .nm{font-family:'Fredoka','Nunito';font-weight:600;font-size:18px;width:34px}
  .row .shape{font:13px/1.4 ui-monospace,monospace;color:#B49AD0;font-weight:700}
  .row.now{background:linear-gradient(180deg,#FFE3EF,#FFD2E6);outline:3px solid var(--berry);box-shadow:0 6px 16px #ff4d8d33}
  .row.next{opacity:.85}.row.done{opacity:.4}
  .score .foot{font-size:11px;font-weight:700;color:#B49AD0;padding:10px 18px;border-top:3px solid var(--line)}
  .main{position:relative;overflow:hidden;background:
      radial-gradient(680px 520px at 12% 6%, var(--peach) 0%, rgba(255,227,209,0) 62%),
      radial-gradient(720px 560px at 96% 22%, var(--lav) 0%, rgba(231,219,255,0) 60%),
      radial-gradient(820px 640px at 82% 104%, var(--mint) 0%, rgba(214,247,230,0) 62%),
      radial-gradient(600px 480px at 22% 110%, #FFE9F1 0%, rgba(255,233,241,0) 64%),
      #FFFDFA}
  #stage{position:absolute;inset:0}
  #cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #ov{position:absolute;inset:0;width:100%;height:100%}
  .top{position:absolute;left:0;right:0;top:0;z-index:3;display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(#fffdfae0,#fffdfa00)}
  .brand{font-family:'Fredoka','Nunito';font-weight:700;font-size:20px;color:var(--ink);text-shadow:0 2px 0 #FFFFFFcc}
  .learn{background:linear-gradient(180deg,#FFD24D,var(--tangy));color:#7A3D00;font-weight:800;font-size:11px;padding:4px 11px;border-radius:999px;letter-spacing:.1em;box-shadow:0 4px 10px #ff9f4340}
  .top .sp{margin-left:auto}
  .status{font-family:'Fredoka','Nunito';font-weight:700;font-size:12px;color:#7A2A52;background:#FFFFFFcc;padding:6px 13px;border-radius:999px;box-shadow:0 4px 12px #ff4d8d1f}
  .status b{color:var(--berry)}
  .ctl{position:absolute;right:16px;bottom:16px;z-index:3;display:flex;gap:10px}
  .ctl button{font:inherit;font-weight:800;font-size:12px;color:#7A2A52;background:#FFFFFFe6;border:2.5px solid #FFB8D4;border-radius:999px;padding:9px 16px;cursor:pointer;box-shadow:0 4px 0 #FFD9E8, 0 8px 16px #ff4d8d1f;transition:transform .08s,box-shadow .08s}
  .ctl button:hover{border-color:var(--berry)}
  .ctl button:active{transform:translateY(3px);box-shadow:0 1px 0 #FFD9E8,0 3px 8px #ff4d8d1f}
  .ctl button.on{background:linear-gradient(180deg,#FF6FA3,var(--berry));color:#fff;border-color:var(--berry);box-shadow:0 4px 0 #C9356C,0 8px 16px #ff4d8d33}
  .handle{position:absolute;width:26px;height:26px;margin:-13px;border:3px solid var(--berry);border-radius:50%;background:#FF4D8D66;cursor:grab;z-index:4;touch-action:none;box-shadow:0 3px 10px #ff4d8d66;display:none}
  .handle:active{cursor:grabbing}
  .handle::after{content:attr(data-lbl);position:absolute;left:30px;top:2px;font:700 10px 'Fredoka',sans-serif;color:#fff;text-shadow:0 1px 4px #000a;white-space:nowrap}
  .cue{position:absolute;left:18px;bottom:16px;z-index:3;font-family:'Fredoka','Nunito';font-weight:600;font-size:13px;color:#7A2A52;background:#FFFFFFcc;padding:6px 13px;border-radius:999px;box-shadow:0 4px 12px #ff4d8d1f}
  .nowchip{font:600 12px/1 'Fredoka','Nunito';background:linear-gradient(180deg,#FF6FA3,var(--berry));color:#fff;padding:4px 11px;border-radius:999px;margin-left:8px;vertical-align:middle;letter-spacing:.04em;box-shadow:0 3px 8px #ff4d8d33}
  .tabwrap{flex:1;position:relative;overflow:hidden;background:linear-gradient(180deg,#FFFFFF,#FFF7FB)}
  .tabwrap #at{position:absolute;top:10px;left:0;transform:translateX(0);will-change:transform}
  .tabwrap.rows{overflow:auto;display:block;padding:8px}
  .playhead{position:absolute;left:30%;top:8px;bottom:8px;width:3px;background:var(--berry);border-radius:999px;box-shadow:0 0 12px #ff4d8daa;pointer-events:none;z-index:2}
  .tabwrap.rows .playhead{display:none}
</style>
</head>
<body>
<div id="app">
  <aside class="score">
    <h1><b>TACTUS</b> · LEARN<span class="nowchip" id="nowchip">—</span></h1>
    <div class="sub" id="songname">loading score…</div>
    <div class="tabwrap" id="tabwrap"><div id="at"></div><div class="playhead"></div></div>
    <div class="foot">real tab · alphaTab · synced to the glow</div>
  </aside>
  <div class="main">
    <div id="stage"><video id="cam" autoplay playsinline muted></video><canvas id="ov"></canvas></div>
    <div class="top"><span class="brand">TACTUS</span><span class="learn">LEARN</span>
      <span class="sp"></span><span class="status" id="status">starting camera…</span></div>
    <div class="cue" id="cue">color = string · <span style="color:var(--berry)">deep + frame closes = strum</span></div>
    <div class="ctl">
      <button id="mode-btn" class="on">✋ auto-fit</button>
      <button id="flip-btn">⇄ flip</button>
      <button id="pause">pause</button>
    </div>
  </div>
</div>
<script>
// ---- SONG: ONE source -> real tab (alphaTab, left) AND the glow chart (right) ----
const SONG={ title:'Tactus Etude', sub:'I–vi–IV–V in G', bpm:100, lead:1.6,
  loop:[
    {name:'G',  shape:[[6,3],[5,2],[4,0],[3,0],[2,0],[1,3]]},
    {name:'Em', shape:[[6,0],[5,2],[4,2],[3,0],[2,0],[1,0]]},
    {name:'C',  shape:[[5,3],[4,2],[3,0],[2,1],[1,0]]},
    {name:'D',  shape:[[4,0],[3,2],[2,3],[1,2]]},
  ] };
const SECPC=4*60/SONG.bpm;
const CHORDS=[...SONG.loop,...SONG.loop].map((c,i)=>({name:c.name,shape:c.shape,t:SONG.lead+i*SECPC,dur:SECPC*0.86}));
const NOTES=[]; CHORDS.forEach((c,i)=>c.shape.forEach(([s,f])=>NOTES.push({t:c.t,string:s,fret:f,dur:c.dur,ci:i,popped:false})));
const SONG_END=CHORDS[CHORDS.length-1].t+SECPC+1.0;
const ALPHATEX=`\\title "${SONG.title}"\n\\subtitle "${SONG.sub}"\n\\tempo ${SONG.bpm}\n.\n:1\n`+
  CHORDS.map(c=>'('+c.shape.map(([s,f])=>`${f}.${s}`).join(' ')+')').join(' |\n')+' |';

const STRING_COLORS=[[255,107,107],[255,159,67],[255,214,53],[38,222,160],[72,182,255],[173,127,255]];
const STRING_NAMES=['e','B','G','D','A','E'];
const WASH=[255,250,252];
const lerp=(a,b,t)=>a.map((v,i)=>Math.round(v+(b[i]-v)*t));
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const WIN=2.2;
function envelope(lead,dur){
  if(lead>WIN) return 0;
  if(lead>=0){ const a=1-lead/WIN; return a*a; }
  if(lead>=-dur){ return 1-0.62*(-lead/dur); }
  return Math.max(0, 0.38-(-lead-dur)*1.8);
}
const NUM_FRETS=4;          // only the first 4 frets (nut end) — fits the neck + less clutter
const fdist=n=>1-Math.pow(2,-n/12), F7=fdist(NUM_FRETS);
const ufret=n=>fdist(n)/F7;
const pressU=f=> f<=0?0:(ufret(f-1)+ufret(f))/2;
const cellUV=(s,f)=>[pressU(f),(s-1)/5];

// ---- neck grid corners (normalized in .main). u = along neck (0 nut..1 fret-NUM_FRETS), v = strings (0 high-e..1 low-E) ----
let C={c00:{x:.16,y:.40},c10:{x:.62,y:.36},c01:{x:.16,y:.60},c11:{x:.62,y:.64}};
let Ctarget=null;
let mode='auto';
try{ const s=JSON.parse(localStorage.getItem('tactus_neck')||'null'); if(s&&s.c00&&s.c11){ C=s; mode='manual'; } }catch(e){}
const main=document.querySelector('.main'), ov=document.getElementById('ov'), ctx=ov.getContext('2d');
const statusEl=document.getElementById('status');
function P(u,v,W,H){ const tl=C.c00,tr=C.c10,bl=C.c01,br=C.c11;
  return [ ((1-u)*(1-v)*tl.x+u*(1-v)*tr.x+(1-u)*v*bl.x+u*v*br.x)*W,
           ((1-u)*(1-v)*tl.y+u*(1-v)*tr.y+(1-u)*v*bl.y+u*v*br.y)*H ]; }

// ---- MANUAL fallback: 4 draggable corner handles (persisted) ----
const handles={}; const HKEYS={c00:'nut·e',c10:'f'+NUM_FRETS+'·e',c01:'nut·E',c11:'f'+NUM_FRETS+'·E'};
function saveNeck(){ try{ localStorage.setItem('tactus_neck',JSON.stringify(C)); }catch(e){} }
['c00','c10','c01','c11'].forEach(k=>{ const h=document.createElement('div'); h.className='handle'; h.dataset.lbl=HKEYS[k]; main.appendChild(h); handles[k]=h; let drag=false;
  h.addEventListener('pointerdown',e=>{ drag=true; h.setPointerCapture(e.pointerId); setMode('manual'); });
  h.addEventListener('pointermove',e=>{ if(!drag)return; const r=main.getBoundingClientRect(); C[k]={x:clamp((e.clientX-r.left)/r.width,0,1),y:clamp((e.clientY-r.top)/r.height,0,1)}; });
  h.addEventListener('pointerup',()=>{ drag=false; saveNeck(); }); });
function placeHandles(W,H){ const show=(mode==='manual'); for(const k in handles){ handles[k].style.display=show?'block':'none'; handles[k].style.left=C[k].x*W+'px'; handles[k].style.top=C[k].y*H+'px'; } }

// ---- mode + flip toggles ----
const modeBtn=document.getElementById('mode-btn'), flipBtn=document.getElementById('flip-btn');
function setMode(m){ mode=m; modeBtn.classList.toggle('on',m==='auto'); modeBtn.textContent=m==='auto'?'✋ auto-fit':'✥ drag mode';
  if(m==='manual') statusEl.innerHTML='manual — <b>drag the 4 dots</b> onto your neck'; }
modeBtn.onclick=()=> setMode(mode==='auto'?'manual':'auto');
let flip=0;                 // bit0 = swap nut/body (along) ; bit1 = swap high-e/low-E (across)
flipBtn.onclick=()=>{ flip=(flip+1)&3; };
setMode(mode);

// ---- camera = the live AR background. ALWAYS ON ----
const cam=document.getElementById('cam');
async function startCam(){
  try{
    // ask for the highest resolution the camera supports (browser clamps the ideal down to the max)
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment', width:{ideal:3840}, height:{ideal:2160}, frameRate:{ideal:30}}});
    cam.srcObject=stream; cam.style.display='block';
    // then force the track to the device's true max (some browsers settle below the ideal)
    try{ const tr=stream.getVideoTracks()[0], caps=tr.getCapabilities&&tr.getCapabilities();
      if(caps&&caps.width&&caps.height){ await tr.applyConstraints({width:caps.width.max, height:caps.height.max}); } }catch(_){}
  }
  catch(e){ statusEl.innerHTML='<b>allow the camera</b> to see your guitar'; setTimeout(startCam,1500); }
}
startCam();

// video-normalized point -> screen-normalized over .main (object-fit:cover crop)
function vidToScreen(nx,ny){ const vw=cam.videoWidth,vh=cam.videoHeight,mw=main.clientWidth,mh=main.clientHeight;
  if(!vw||!vh||!mw||!mh) return [nx,ny];
  const s=Math.max(mw/vw,mh/vh), dw=vw*s, dh=vh*s, ox=(dw-mw)/2, oy=(dh-mh)/2;
  return [ (nx*dw-ox)/mw, (ny*dh-oy)/mh ]; }

// ---- AUTO: YOLO-World + SAM2 Python backend over WebSocket ----
const NUT_TO_F7=0.40;       // the 4-fret grid covers ~the nut-end 0.40 of the visible neck (nut->body)
let ws=null, wsOK=false, inflight=false, inflightT=0;
function connectWS(){
  try{ ws=new WebSocket('ws://localhost:8770'); }catch(e){ ws=null; setTimeout(connectWS,2500); return; }
  ws.binaryType='arraybuffer';
  ws.onopen =()=>{ wsOK=true; };
  ws.onclose=()=>{ wsOK=false; ws=null; setTimeout(connectWS,2500); };
  ws.onerror=()=>{ try{ws.close();}catch(e){} };
  ws.onmessage=(ev)=>{
    inflight=false;
    if(mode!=='auto') return;
    let d; try{ d=JSON.parse(ev.data); }catch(e){ return; }
    if(!d || !d.quad || (d.confidence!=null && d.confidence<0.30)) return;
    const q=d.quad.map(([nx,ny])=>{ const[x,y]=vidToScreen(nx,ny); return {x,y}; });
    let nutA=q[0], endA=q[1], endB=q[2], nutB=q[3];
    if(flip&1){ const a=nutA;nutA=endA;endA=a; const b=nutB;nutB=endB;endB=b; }
    if(flip&2){ const a=nutA;nutA=nutB;nutB=a; const b=endA;endA=endB;endB=b; }
    const f7A={x:nutA.x+NUT_TO_F7*(endA.x-nutA.x), y:nutA.y+NUT_TO_F7*(endA.y-nutA.y)};
    const f7B={x:nutB.x+NUT_TO_F7*(endB.x-nutB.x), y:nutB.y+NUT_TO_F7*(endB.y-nutB.y)};
    const nt={c00:nutA, c10:f7A, c01:nutB, c11:f7B};
    // EMA the incoming detection into the current target -> much less jumpy
    if(Ctarget){ const B=0.4; for(const k in nt){ nt[k]={x:Ctarget[k].x+(nt[k].x-Ctarget[k].x)*B, y:Ctarget[k].y+(nt[k].y-Ctarget[k].y)*B}; } }
    Ctarget=nt;
  };
}
connectWS();
const snap=document.createElement('canvas');
setInterval(()=>{
  if(mode!=='auto') return;
  if(!cam.videoWidth){ statusEl.textContent='waiting for camera…'; return; }
  if(!wsOK || !ws || ws.readyState!==1){ statusEl.innerHTML='auto detector offline — start the backend, or tap <b>✥</b> to drag'; return; }
  statusEl.innerHTML = Ctarget ? 'auto-locked <b>✓</b> (neck) — tap ⇄ if flipped' : 'auto — <b>show your guitar</b> (detecting…)';
  if(inflight && performance.now()-inflightT<6000) return;
  const vw=cam.videoWidth, vh=cam.videoHeight, w=480, h=Math.max(1,Math.round(480*vh/vw));
  snap.width=w; snap.height=h; snap.getContext('2d').drawImage(cam,0,0,w,h);
  try{ snap.toBlob(b=>{ if(b && ws && ws.readyState===1){ ws.send(b); inflight=true; inflightT=performance.now(); } }, 'image/jpeg', 0.6); }catch(e){}
}, 200);

// ---- left panel: real tab via alphaTab. fallback = chord rows ----
const tabAt=document.getElementById('at'), tabWrap=document.getElementById('tabwrap');
document.getElementById('songname').textContent=SONG.title+' · '+SONG.sub;
let atReady=false, atApi=null;
function fallbackRows(){ atReady=false; tabWrap.classList.add('rows');
  tabWrap.innerHTML=CHORDS.map((c,i)=>`<div class="row" id="row${i}"><span class="nm">${c.name}</span><span class="shape">${c.shape.map(([s,f])=>f).join(' ')}</span></div>`).join(''); }
function initTab(){ if(!window.alphaTab){ fallbackRows(); return; }
  try{ atApi=new alphaTab.AlphaTabApi(tabAt,{ core:{tex:true,fontDirectory:'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/font/'}, display:{layout:'horizontal',scale:0.7,staveProfile:'ScoreTab'}, player:{enablePlayer:false} });
    atApi.error.on(()=>fallbackRows());
    atApi.renderFinished.on(()=>{ atReady=true; });
    atApi.tex(ALPHATEX);
  }catch(e){ fallbackRows(); } }
initTab();

// ---- helpers ----
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
const pops=[];
function spawnPop(x,y,ang,w,h,rgb){ pops.push({x,y,ang,w,h,rgb,life:0}); }

// ---- clock + render ----
let now=0,playing=true,last=performance.now();
document.getElementById('pause').onclick=e=>{playing=!playing;e.target.textContent=playing?'pause':'play';};
function draw(dt){
  // ease the grid toward the (already EMA'd) detection — slow = smooth tracking
  if(mode==='auto' && Ctarget){ for(const k in Ctarget){ C[k].x+=(Ctarget[k].x-C[k].x)*0.12; C[k].y+=(Ctarget[k].y-C[k].y)*0.12; } }
  const W=ov.width=main.clientWidth, H=ov.height=main.clientHeight;
  ctx.clearRect(0,0,W,H);
  // size the UI to the GRID cell (not the viewport) so it always fits the detected neck
  const gwpx=Math.hypot((C.c10.x-C.c00.x)*W,(C.c10.y-C.c00.y)*H), ghpx=Math.hypot((C.c01.x-C.c00.x)*W,(C.c01.y-C.c00.y)*H);
  const cell=Math.max(8, Math.min(gwpx/Math.max(1,NUM_FRETS), ghpx/5));
  const sA=0.6, fA=0.4;
  ctx.lineWidth=Math.max(1.4,cell*0.07);
  for(let s=1;s<=6;s++){ const c=STRING_COLORS[s-1]; ctx.strokeStyle=`rgba(${c.join(',')},${sA})`; ctx.beginPath();
    for(let f=0;f<=NUM_FRETS;f++){ const[x,y]=P(ufret(f),(s-1)/5,W,H); f?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke(); }
  ctx.lineWidth=Math.max(1,cell*0.04);
  for(let f=0;f<=NUM_FRETS;f++){ ctx.strokeStyle=`rgba(173,127,255,${f===0?fA+0.3:fA})`; ctx.beginPath();
    for(let s=1;s<=6;s++){ const[x,y]=P(ufret(f),(s-1)/5,W,H); s>1?ctx.lineTo(x,y):ctx.moveTo(x,y);} ctx.stroke(); }
  const lblR=Math.max(7,cell*0.42), lblF=Math.max(8,Math.round(cell*0.5));
  for(let s=1;s<=6;s++){ const c=STRING_COLORS[s-1].join(','); const[x,y]=P(-0.10,(s-1)/5,W,H);
    ctx.fillStyle='rgba(58,42,74,0.82)'; roundRect(x-lblR,y-lblR*0.9,lblR*2,lblR*1.8,lblR*0.42); ctx.fill();
    ctx.fillStyle=`rgb(${c})`; ctx.font=`600 ${lblF}px Fredoka,Nunito,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(STRING_NAMES[s-1],x,y+1); }

  const R=Math.max(6, cell*0.40);
  for(const n of NOTES){
    if(n.fret>NUM_FRETS) continue;           // only draw notes within the shown fret window
    const lead=n.t-now, bright=envelope(lead,n.dur);
    if(bright<=0){ continue; }
    const sc=STRING_COLORS[n.string-1];
    const prox = lead>0 ? (1-clamp(lead/WIN,0,1)) : 1;
    const washed=lerp(sc,WASH,0.6);
    const rgb=lerp(washed,sc,prox).join(',');
    const core=lerp(sc,[255,255,255],0.5).join(',');
    const[u,v]=cellUV(n.string,n.fret); const[x,y]=P(u,v,W,H);
    const[xa,ya]=P(Math.min(1,u+0.05),v,W,H); const ang=Math.atan2(ya-y,xa-x);
    const w=R*2.0, h=R*1.4, rr=h*0.5;
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
    ctx.shadowColor=`rgba(58,28,52,${0.34*bright+0.14})`; ctx.shadowBlur=8*bright+4;
    ctx.fillStyle=`rgba(58,28,52,${0.16+0.18*bright})`; roundRect(-w/2,-h/2,w,h,rr); ctx.fill();
    ctx.shadowColor=`rgba(${rgb},${bright})`; ctx.shadowBlur=20*bright+5;
    ctx.fillStyle=`rgba(${rgb},${0.44+0.5*bright})`; roundRect(-w/2,-h/2,w,h,rr); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(48,22,44,${0.28+0.34*bright})`; ctx.lineWidth=Math.max(1,cell*0.04); roundRect(-w/2,-h/2,w,h,rr); ctx.stroke();
    ctx.fillStyle=`rgba(${core},${0.22+0.7*bright})`; roundRect(-w*0.3,-h*0.3,w*0.6,h*0.6,h*0.34); ctx.fill();
    if(n.fret>0){ ctx.fillStyle=`rgba(50,20,42,${Math.min(1,bright+0.35)})`; ctx.font=`700 ${Math.max(8,Math.round(h*0.6))}px Fredoka,Nunito,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(n.fret,0,0); }
    if(lead>0){ const k=1+2.4*clamp(lead/WIN,0,1); ctx.strokeStyle=`rgba(${rgb},${0.28+0.55*bright})`; ctx.lineWidth=Math.max(1.5,cell*0.07); roundRect(-w*k/2,-h*k/2,w*k,h*k,rr*k); ctx.stroke(); }
    ctx.restore();
    if(!n.popped && lead<=0){ n.popped=true; spawnPop(x,y,ang,w,h,sc.join(',')); }
  }
  for(let i=pops.length-1;i>=0;i--){ const p=pops[i]; p.life+=dt*3; const e=1-(1-p.life)*(1-p.life), a=Math.max(0,1-p.life*p.life), k=1+e*1.05;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.ang); ctx.strokeStyle=`rgba(${p.rgb},${a})`; ctx.lineWidth=Math.max(2,cell*0.1);
    roundRect(-p.w*k/2,-p.h*k/2,p.w*k,p.h*k,p.h*0.5*k); ctx.stroke(); ctx.restore();
    if(p.life>=1) pops.splice(i,1); }
  placeHandles(W,H);
  let cur=-1; for(let i=0;i<CHORDS.length;i++){ if(now>=CHORDS[i].t-0.2 && now<CHORDS[i].t+SECPC) cur=i; }
  if(atReady){ const span=SONG_END-SONG.lead, frac=clamp((now-SONG.lead+0.3)/span,0,1), max=Math.max(0,tabAt.scrollWidth-tabWrap.clientWidth); tabAt.style.transform=`translateX(${-frac*max}px)`; }
  else { CHORDS.forEach((c,i)=>{ const el=document.getElementById('row'+i); if(el) el.className='row '+(i===cur?'now':(now>c.t+SECPC?'done':'next')); }); }
  const nc=document.getElementById('nowchip'); if(nc) nc.textContent=cur>=0?CHORDS[cur].name:'—';
}
function frame(t){ const dt=Math.min(0.05,(t-last)/1000); last=t; if(playing){ now+=dt; if(now>SONG_END){ now=0; NOTES.forEach(n=>n.popped=false); } } draw(dt); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
