<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tactus — live semantic vector space (Redis)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#07060D;color:#EDE7FF;font-family:'Nunito',sans-serif;overflow:hidden}
  #scene{position:absolute;inset:0}
  .hdr{position:absolute;left:22px;top:16px;z-index:2;pointer-events:none}
  .hdr h1{font:700 21px 'Fredoka';margin:0}
  .hdr h1 b{color:#FF4D8D}
  .hdr .sub{font:700 11px 'JetBrains Mono';color:#8B7FB0;margin-top:4px}
  .badge{display:inline-block;font:700 11px 'JetBrains Mono';color:#07060D;background:#3DDC84;padding:2px 7px;border-radius:5px;margin-right:5px}
  .legend{position:absolute;right:22px;top:16px;z-index:2;font:800 12px 'Fredoka';display:flex;gap:14px;pointer-events:none}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .guide{position:absolute;left:22px;bottom:84px;z-index:2;max-width:420px;background:#160F2Ec8;border:1.5px solid #6b5a9e66;border-radius:16px;padding:14px 16px;backdrop-filter:blur(8px)}
  .guide .ask{font:800 11px 'JetBrains Mono';letter-spacing:.14em;color:#8B7FB0}
  .guide .note{font:700 22px 'Fredoka';color:#fff;margin:4px 0 2px}
  .guide .fb{font:800 13px 'Fredoka';min-height:18px}
  .guide .fb.ok{color:#3DDC84}.guide .fb.err{color:#FF6F6F}
  .stat{position:absolute;right:22px;bottom:84px;z-index:2;background:#160F2Ec8;border:1.5px solid #6b5a9e66;border-radius:16px;padding:12px 16px;text-align:right;backdrop-filter:blur(8px)}
  .stat b{font:800 26px 'Fredoka';color:#fff;display:block}
  .stat .row{font:700 11px 'JetBrains Mono';color:#B7A9E0;margin-top:6px}
  .ctl{position:absolute;left:0;right:0;bottom:16px;z-index:2;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .ctl button{font:800 12px 'Fredoka';color:#fff;background:#241a40;border:1.5px solid #6b5a9e;border-radius:999px;padding:10px 16px;cursor:pointer}
  .ctl button:hover{border-color:#FF4D8D}
  .ctl button.on{background:linear-gradient(180deg,#FF6FA3,#FF4D8D);border-color:#FF4D8D}
  .off{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);font:700 13px 'JetBrains Mono';color:#FF6F6F;text-align:center;z-index:3;display:none;line-height:1.7}
</style>
</head>
<body>
<div id="scene"></div>
<div class="hdr">
  <h1><b>Tactus</b> · live semantic vector space</h1>
  <div class="sub"><span class="badge" id="vcard">VCARD …</span> every note → 28-D aux-audio → PCA eigenbasis → <b>VADD</b>/<b>VSIM</b> in Redis · <span id="var">PC…</span></div>
</div>
<div class="legend">
  <span><i style="background:#3DDC84"></i>clean</span>
  <span><i style="background:#FF9F43"></i>buzz</span>
  <span><i style="background:#8A7BFF"></i>muted</span>
  <span><i style="background:#fff"></i>you (live)</span>
</div>
<div class="guide">
  <div class="ask">PLAY THIS</div>
  <div class="note" id="ask">— start the mic —</div>
  <div class="fb" id="fb"></div>
</div>
<div class="stat">
  <b id="count">0</b>
  <div class="row">notes in <span style="color:#fff">tactus:live</span></div>
  <div class="row" id="errrow">0 errors clustered</div>
</div>
<div class="off" id="off"></div>
<div class="ctl">
  <button id="mic">● start mic</button>
  <button id="demoC">＋ demo clean</button>
  <button id="demoM">＋ demo muted</button>
  <button id="spin" class="on">⟳ auto-rotate</button>
  <button id="reset">reset live</button>
</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const API='http://localhost:8771';
const CLASS_COLOR={clean:0x3DDC84,buzz:0xFF9F43,muted:0x8A7BFF};

// ---------- three.js scene ----------
const host=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio); renderer.setSize(innerWidth,innerHeight);
host.appendChild(renderer.domElement);
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x07060D);
scene.fog=new THREE.FogExp2(0x07060D,0.0016);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,4000);
camera.position.set(0,40,260);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.autoRotate=true; controls.autoRotateSpeed=0.6;
scene.add(new THREE.AmbientLight(0xffffff,0.9));
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// ---------- coordinate transform (fit PCA coords into a viewable cube) ----------
let Tf=null; // {cx,cy,cz,scale}
function transform(p){ return [ (p[0]-Tf.cx)*Tf.scale, (p[1]-Tf.cy)*Tf.scale, (p[2]-Tf.cz)*Tf.scale ]; }
function clampToBox(v,lim){ return Math.max(-lim,Math.min(lim,v)); }

function buildTransform(points){
  const xs=points.map(p=>p.x),ys=points.map(p=>p.y),zs=points.map(p=>p.z);
  const mid=a=>(Math.min(...a)+Math.max(...a))/2, span=a=>Math.max(1e-6,Math.max(...a)-Math.min(...a));
  const cx=mid(xs),cy=mid(ys),cz=mid(zs);
  const scale=180/Math.max(span(xs),span(ys),span(zs));   // largest axis -> ~180 units
  Tf={cx,cy,cz,scale};
}

function labelSprite(text,hex){
  const cv=document.createElement('canvas');cv.width=256;cv.height=64;const c=cv.getContext('2d');
  c.font="700 34px Fredoka, sans-serif";c.fillStyle=hex;c.textAlign='center';c.textBaseline='middle';
  c.fillText(text,128,34);
  const tx=new THREE.CanvasTexture(cv);tx.needsUpdate=true;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false}));
  sp.scale.set(46,11.5,1);return sp;
}

const liveGroup=new THREE.Group(); scene.add(liveGroup);
const linkGroup=new THREE.Group(); scene.add(linkGroup);
const liveGeo=new THREE.SphereGeometry(1,16,16);
const livePts=[]; // {mesh, born}
let coordById={};

async function loadSpace(){
  let d;
  try{ d=await (await fetch(API+'/space3d')).json(); }
  catch(e){ document.getElementById('off').style.display='block';
    document.getElementById('off').innerHTML='vector service offline — run:<br>REDIS_PORT=6380 python3 software/ai/analysis/exp/redis_live.py'; return; }
  document.getElementById('vcard').textContent='VCARD '+d.n;
  document.getElementById('var').textContent='PC1 '+Math.round(d.var[0]*100)+'% · PC2 '+Math.round(d.var[1]*100)+'% · PC3 '+Math.round(d.var[2]*100)+'%';
  buildTransform(d.points);

  // background cloud (the learned semantic regions)
  const g=new THREE.BufferGeometry();
  const pos=new Float32Array(d.points.length*3), col=new Float32Array(d.points.length*3);
  d.points.forEach((p,i)=>{ const t=transform([p.x,p.y,p.z]); pos.set(t,i*3);
    const c=new THREE.Color(CLASS_COLOR[p.cls]||0x888888); col.set([c.r,c.g,c.b],i*3);
    coordById[p.id]=t; });
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.setAttribute('color',new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({size:2.4,vertexColors:true,transparent:true,opacity:0.5,depthWrite:false})));

  // region blobs + labels (semantic meaning of the geography)
  d.regions.forEach(r=>{
    const t=transform(r.centroid);
    if(r.kind==='class'){
      const m=new THREE.Mesh(new THREE.SphereGeometry(34,24,24),
        new THREE.MeshBasicMaterial({color:CLASS_COLOR[r.label]||0x888888,transparent:true,opacity:0.05,depthWrite:false}));
      m.position.set(...t); scene.add(m);
      const lab=labelSprite(r.label.toUpperCase()+(r.label!=='clean'?' (error)':''),'#'+new THREE.Color(CLASS_COLOR[r.label]).getHexString());
      lab.position.set(t[0],t[1]+40,t[2]); scene.add(lab);
    }else{
      const lab=labelSprite(r.label,'#cdbcff'); lab.scale.set(40,10,1);
      lab.position.set(t[0],t[1]+14,t[2]); scene.add(lab);
    }
  });
}

// ---------- add a live point ----------
let errors=0;
function addLivePoint(res){
  const lim=170;
  const t=transform([res.point.x,res.point.y,res.point.z]).map(v=>clampToBox(v,lim));
  const color=CLASS_COLOR[res.pred_class]||0xFF4D8D;
  const m=new THREE.Mesh(liveGeo,new THREE.MeshBasicMaterial({color}));
  m.position.set(...t); m.scale.setScalar(0.1); liveGroup.add(m);
  livePts.push({mesh:m,born:performance.now()});
  if(livePts.length>400){ const old=livePts.shift(); liveGroup.remove(old.mesh); }

  // neighbour links for the freshest point (the VSIM result, drawn)
  linkGroup.clear();
  (res.neighbors||[]).slice(0,8).forEach(nb=>{
    const nt=transform([nb.x,nb.y,nb.z]);
    const geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...t),new THREE.Vector3(...nt)]);
    linkGroup.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.45})));
  });

  document.getElementById('count').textContent=res.live_vcard;
  if(res.is_error){ errors++; document.getElementById('errrow').textContent=errors+' errors clustered'; }
  return res;
}

// ---------- guide / requested notes ----------
const GUIDE=[
  {cls:'clean',string:'A',text:'CLEAN note · A string'},
  {cls:'clean',string:'D',text:'CLEAN note · D string'},
  {cls:'muted',string:'A',text:'MUTE the A (rest finger, no press)'},
  {cls:'buzz', string:'low-E',text:'BUZZ the low-E (press light)'},
  {cls:'clean',string:'G',text:'CLEAN note · G string'},
  {cls:'muted',string:'D',text:'MUTE the D string'},
];
let gi=0;
function showAsk(){ document.getElementById('ask').textContent=GUIDE[gi%GUIDE.length].text; }
function feedback(res){
  const want=GUIDE[gi%GUIDE.length], fb=document.getElementById('fb');
  if(res.pred_class===want.cls){ fb.className='fb ok'; fb.textContent='✓ landed in the '+res.pred_class+' cluster'; }
  else { fb.className='fb err'; fb.textContent='→ landed in '+res.pred_class+' ('+res.pred_string+')'; }
  gi++; showAsk();
}

// ---------- POST a note to /embed ----------
async function embed(int16, sr){
  let bin=''; const u8=new Uint8Array(int16.buffer);
  for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
  const body=JSON.stringify({sr, pcm_b64:btoa(bin), requested:GUIDE[gi%GUIDE.length]});
  try{
    const res=await (await fetch(API+'/embed',{method:'POST',headers:{'Content-Type':'application/json'},body})).json();
    if(res.silent||res.error) return;
    addLivePoint(res); feedback(res);
  }catch(e){}
}

// ---------- microphone: onset-gated window capture ----------
let actx=null, micOn=false, ring=null, ringLen=0, w=0, lastOnset=0, capturing=false, SR=48000;
document.getElementById('mic').onclick=async(e)=>{
  if(micOn){ if(actx) actx.suspend(); micOn=false; e.target.classList.remove('on'); e.target.textContent='● start mic'; return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    actx=new (window.AudioContext||window.webkitAudioContext)(); SR=actx.sampleRate;
    ringLen=Math.ceil(SR*1.2); ring=new Float32Array(ringLen); w=0;
    const src=actx.createMediaStreamSource(stream);
    const sp=actx.createScriptProcessor(2048,1,1);
    const sink=actx.createGain(); sink.gain.value=0;
    src.connect(sp); sp.connect(sink); sink.connect(actx.destination);
    sp.onaudioprocess=(ev)=>{
      const inb=ev.inputBuffer.getChannelData(0);
      let s=0; for(let i=0;i<inb.length;i++){ ring[w]=inb[i]; w=(w+1)%ringLen; s+=inb[i]*inb[i]; }
      const rms=Math.sqrt(s/inb.length);
      const now=performance.now();
      if(rms>0.02 && now-lastOnset>420 && !capturing){ lastOnset=now; capturing=true;
        setTimeout(()=>{ captureWindow(); capturing=false; }, 80); }
    };
    micOn=true; e.target.classList.add('on'); e.target.textContent='● listening…'; showAsk();
  }catch(err){ alert('mic blocked: '+err); }
};
function captureWindow(){
  const N=Math.floor(SR*0.32); const out=new Int16Array(N);
  let idx=(w-N+ringLen)%ringLen;
  for(let i=0;i<N;i++){ const v=ring[idx]; out[i]=Math.max(-32768,Math.min(32767,v*32767)); idx=(idx+1)%ringLen; }
  embed(out,SR);
}

// ---------- demo notes (synthesize audio, no mic needed — for video/testing) ----------
function synth(kind){
  const sr=48000,N=Math.floor(sr*0.32),y=new Int16Array(N);
  for(let i=0;i<N;i++){ const t=i/sr; let v;
    if(kind==='clean'){ v=0; for(let k=1;k<=7;k++) v+=(1/k)*Math.sin(2*Math.PI*110*k*t); v*=Math.exp(-3*t)*0.25; }
    else { v=(Math.random()*2-1)*Math.exp(-35*t)*0.5; }   // muted thud
    y[i]=Math.max(-32768,Math.min(32767,v*32767)); }
  return y;
}
document.getElementById('demoC').onclick=()=>embed(synth('clean'),48000);
document.getElementById('demoM').onclick=()=>embed(synth('muted'),48000);
document.getElementById('spin').onclick=(e)=>{ controls.autoRotate=!controls.autoRotate; e.target.classList.toggle('on',controls.autoRotate); };
document.getElementById('reset').onclick=async()=>{ livePts.forEach(p=>liveGroup.remove(p.mesh)); livePts.length=0; linkGroup.clear(); errors=0;
  document.getElementById('errrow').textContent='0 errors clustered'; gi=0; showAsk(); };

// ---------- render loop ----------
function tick(){
  const now=performance.now();
  for(const p of livePts){ const a=Math.min(1,(now-p.born)/260);   // birth pop -> settle
    p.mesh.scale.setScalar(2.6*(0.45+0.55*a) + (a<1?3.2*(1-a):0)); }
  controls.update(); renderer.render(scene,camera); requestAnimationFrame(tick);
}
loadSpace().then(()=>{ tick(); });
</script>
</body>
</html>
