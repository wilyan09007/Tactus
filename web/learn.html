<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tactus · feel every note</title>
<!-- MERGE: poster "Feel every note." text (landing-4) on the diagonal string-line
     background (landing-1) + staggered entrance slide animation. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FFFBF6; --ink:#3A2A4A; --berry:#FF4D8D; --line:#FBD9E6;
    --peach:#FFE3D1; --mint:#D6F7E6; --lav:#E7DBFF; --grape:#AD7FFF; --tangy:#FF9F43;
    --s1:#FF6B6B; --s2:#FF9F43; --s3:#FFD635; --s4:#26DEA0; --s5:#48B6FF; --s6:#AD7FFF;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    font-family:'Nunito',-apple-system,Segoe UI,sans-serif;color:var(--ink);
    background:
      radial-gradient(900px 620px at 8% -6%, var(--peach) 0%, rgba(255,227,209,0) 60%),
      radial-gradient(820px 640px at 102% 14%, var(--lav) 0%, rgba(231,219,255,0) 58%),
      radial-gradient(1000px 780px at 88% 108%, var(--mint) 0%, rgba(214,247,230,0) 60%),
      radial-gradient(760px 560px at 18% 112%, #FFE9F1 0%, rgba(255,233,241,0) 62%),
      #FFFBF6;
    min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;
  }

  /* ---- diagonal string-line background (from landing-1) ---- */
  .strings{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;animation:bgDrift 16s ease-in-out infinite alternate}
  .strings .ln{position:absolute;left:-8%;right:-8%;height:2px;border-radius:2px;transform:rotate(-7deg);transform-origin:left;
    animation:lnDraw 1.1s cubic-bezier(.22,.9,.27,1) both}
  .strings .ln::after{content:"";position:absolute;right:0;top:50%;width:9px;height:9px;border-radius:50%;transform:translateY(-50%);background:inherit;box-shadow:0 0 12px currentColor}
  .strings .ln.l1{top:16%;background:var(--s1);animation-delay:.05s} .strings .ln.l2{top:23%;background:var(--s2);animation-delay:.12s}
  .strings .ln.l3{top:30%;background:var(--s3);animation-delay:.19s} .strings .ln.l4{top:71%;background:var(--s4);animation-delay:.26s}
  .strings .ln.l5{top:78%;background:var(--s5);animation-delay:.33s} .strings .ln.l6{top:85%;background:var(--s6);animation-delay:.40s}
  @keyframes lnDraw{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
  @keyframes bgDrift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-14px,-8px,0)}}

  /* ---- brand ---- */
  .nav{position:relative;z-index:5;display:flex;align-items:center;gap:10px;padding:26px 34px}
  .brand{font-family:'Fredoka','Nunito';font-weight:700;font-size:23px;color:var(--ink);letter-spacing:-.3px;text-shadow:0 2px 0 #FFFFFFcc}
  .dot{color:#D9B7E8;margin:0 2px;font-weight:600}
  .learn{background:linear-gradient(180deg,#FFD24D,var(--tangy));color:#7A3D00;font-weight:800;
    font-size:12px;padding:4px 12px;border-radius:999px;letter-spacing:.1em;box-shadow:0 4px 10px #ff9f4340}
  .nav .right{margin-left:auto;font-weight:800;font-size:13px;color:#A77FC9;display:flex;align-items:center;gap:8px}
  .nav .right .pip{width:9px;height:9px;border-radius:50%;background:var(--s4);box-shadow:0 0 9px var(--s4)}

  /* ---- stage ---- */
  .stage{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:14px 24px 60px}
  .wrap{position:relative;z-index:2;max-width:920px;width:100%}

  .eyebrow{font-family:'Fredoka','Nunito';font-weight:600;font-size:14px;letter-spacing:.16em;
    text-transform:uppercase;color:#B06A92;margin:0 0 18px}

  h1{font-family:'Fredoka','Nunito';font-weight:700;color:var(--ink);
    font-size:clamp(58px,10.5vw,138px);line-height:.9;letter-spacing:-.035em;
    margin:0;text-shadow:0 3px 0 #FFFFFF, 0 5px 22px #ff4d8d12}
  h1 .pink{color:var(--berry);text-shadow:0 3px 0 #FFFFFF, 0 8px 26px #ff4d8d2e}
  h1 .line2{display:block}

  .subhead{font-size:clamp(17px,2.1vw,22px);font-weight:700;color:#6E5685;
    max-width:620px;margin:26px auto 0;line-height:1.45}
  .subhead b{color:var(--ink)}

  /* ---- action group ---- */
  .actions{margin:38px auto 0;max-width:660px;width:100%}
  .inputrow{display:flex;gap:12px;align-items:stretch}
  #link{flex:1;min-width:0;font-family:'Nunito';font-weight:700;font-size:17px;color:var(--ink);
    background:#FFFFFFf2;border:2.5px solid #FFB8D4;border-radius:999px;padding:17px 24px;
    box-shadow:0 4px 0 #FFD9E8, 0 8px 16px #ff4d8d12;outline:none;transition:box-shadow .15s,border-color .15s,transform .06s}
  #link::placeholder{color:#C4A7BC;font-weight:700}
  #link:focus{border-color:var(--berry);box-shadow:0 4px 0 #FFD9E8, 0 0 0 5px #ff4d8d22, 0 10px 22px #ff4d8d1f}

  .btn{font-family:'Fredoka','Nunito';font-weight:700;cursor:pointer;white-space:nowrap;
    border-radius:999px;border:2.5px solid #FFB8D4;background:#FFFFFFe6;color:#7A2A52;
    font-size:17px;padding:16px 22px;box-shadow:0 4px 0 #FFD9E8, 0 8px 16px #ff4d8d1f;
    transition:transform .06s ease, box-shadow .12s ease;-webkit-tap-highlight-color:transparent}
  .btn:hover{box-shadow:0 4px 0 #FFD9E8, 0 10px 22px #ff4d8d29}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #FFD9E8, 0 5px 12px #ff4d8d22}
  .btn.primary{padding:16px 34px;color:#fff;border-color:#FF8FB6;
    background:linear-gradient(180deg,#FF6FA3,#FF4D8D);
    box-shadow:0 4px 0 #C9356C, 0 8px 16px #ff4d8d33}
  .btn.primary:hover{box-shadow:0 4px 0 #C9356C, 0 11px 24px #ff4d8d44}
  .btn.primary:active{transform:translateY(3px);box-shadow:0 1px 0 #C9356C, 0 5px 12px #ff4d8d33}

  .presets{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0 0}
  .chip{font-family:'Nunito';font-weight:800;font-size:14.5px;cursor:pointer;
    border-radius:999px;border:2.5px solid #FFCBDE;background:#FFFFFFcc;color:#9A4A72;
    padding:9px 16px;box-shadow:0 3px 0 #FFE0EC, 0 6px 12px #ff4d8d12;
    transition:transform .1s ease, box-shadow .12s ease, background .12s}
  .chip:hover{background:#fff;transform:translateY(-1px);box-shadow:0 4px 0 #FFE0EC, 0 8px 16px #ff4d8d20}
  .chip:active{transform:translateY(2px);box-shadow:0 1px 0 #FFE0EC, 0 4px 9px #ff4d8d18}

  .helper{font-size:13px;font-weight:700;color:#B49AD0;margin:14px 0 0;letter-spacing:.01em}

  /* ---- proof chips ---- */
  .proof{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:46px auto 0}
  .pchip{display:inline-flex;align-items:center;gap:9px;font-family:'Nunito';font-weight:800;
    font-size:14px;color:#6E5685;background:#FFFFFFcc;border:2px solid var(--line);
    border-radius:999px;padding:9px 17px;box-shadow:0 4px 12px #ad7fff14}
  .pchip .ic{font-size:16px;line-height:1}
  .pchip.access{border-color:#CFE0FF;color:#3C5C8A;background:#F2F7FF}

  /* ---- entrance slide animation ---- */
  @keyframes riseIn{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
  .anim{animation:riseIn .72s cubic-bezier(.22,.9,.27,1) both}
  @media (prefers-reduced-motion:reduce){
    .anim{animation:none;opacity:1}
    .strings .ln{animation:none;clip-path:none}
    .strings{animation:none}
  }

  @media (max-width:560px){
    .nav{padding:20px}
    .inputrow{flex-direction:column}
    .btn.primary{padding:16px 22px}
    h1{font-size:clamp(46px,15vw,84px)}
  }

  /* ---- featured songs ---- */
  .songs{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:18px auto 0}
  .song{display:flex;align-items:center;gap:12px;cursor:pointer;text-align:left;font:inherit;
    background:#FFFFFFd9;border:2.5px solid #FFCBDE;border-radius:20px;padding:11px 20px 11px 13px;
    box-shadow:0 4px 0 #FFE0EC,0 8px 18px #ff4d8d14;transition:transform .12s,box-shadow .12s}
  .song:hover{transform:translateY(-2px);box-shadow:0 6px 0 #FFE0EC,0 13px 26px #ff4d8d22}
  .song:active{transform:translateY(1px)}
  .song .play{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-size:15px;
    background:linear-gradient(180deg,#FF6FA3,#FF4D8D);box-shadow:0 4px 10px #ff4d8d44}
  .song .meta{display:flex;flex-direction:column;line-height:1.15}
  .song .t{font-family:'Fredoka','Nunito';font-weight:700;font-size:17px;color:var(--ink)}
  .song .a{font-weight:800;font-size:12.5px;color:#A77FC9}

  /* ---- identify / progress flow ---- */
  .flow{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;
    background:rgba(255,251,246,.9);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transform:translateY(100%);transition:transform .5s cubic-bezier(.22,.9,.27,1);will-change:transform}
  .flow.show{transform:translateY(0)}
  .flow .card{width:min(520px,94vw);text-align:center}
  .flow .wave{display:flex;gap:5px;align-items:center;justify-content:center;height:48px;margin:0 0 18px}
  .flow .wave i{width:6px;height:30%;border-radius:6px;background:var(--berry);opacity:.85;animation:eq .8s ease-in-out infinite alternate}
  @keyframes eq{from{height:14%}to{height:100%}}
  .flow .ttl{font-family:'Fredoka','Nunito';font-weight:700;font-size:30px;color:var(--ink);margin:0}
  .flow .ttl .pink{color:var(--berry)}
  .flow .art{font-weight:800;color:#A77FC9;margin:3px 0 20px;min-height:18px}
  .flow .pbar{height:12px;border-radius:999px;background:#FBE3EE;overflow:hidden;margin:0 0 20px}
  .flow .pbar i{display:block;height:100%;width:2%;border-radius:999px;
    background:linear-gradient(90deg,#FFD24D,#FF9F43,#FF4D8D,#AD7FFF);transition:width .4s ease}
  .flow .steps{display:flex;flex-direction:column;gap:10px;text-align:left;max-width:360px;margin:0 auto}
  .flow .step{display:flex;align-items:center;gap:11px;font-weight:800;color:#C2A7D6;opacity:.55;transition:opacity .3s,color .3s}
  .flow .step.on{opacity:1;color:#7A2A52}
  .flow .step .ic{width:23px;height:23px;border-radius:50%;flex:none;display:grid;place-items:center;
    font-size:12px;font-weight:800;color:#fff;background:#E9C6D6;transition:background .3s}
  .flow .step.on .ic{background:linear-gradient(180deg,#FF6FA3,#FF4D8D)}
  .flow .step.done .ic{background:linear-gradient(180deg,#26DEA0,#13A874)}
  .flow .step .res{margin-left:auto;font-weight:800;color:#12a06b;font-size:13px}
</style>
</head>
<body>
  <div class="strings" aria-hidden="true">
    <span class="ln l1"></span><span class="ln l2"></span><span class="ln l3"></span>
    <span class="ln l4"></span><span class="ln l5"></span><span class="ln l6"></span>
  </div>

  <nav class="nav anim" style="animation-delay:.02s">
    <span class="brand">TACTUS</span>
  </nav>

  <main class="stage">
    <div class="wrap">
      <p class="eyebrow anim" style="animation-delay:.10s">A haptic guitar coach</p>
      <h1 class="anim" style="animation-delay:.18s">
        Feel every<span class="line2"><span class="pink">note.</span></span>
      </h1>
      <p class="subhead anim" style="animation-delay:.30s">
        Learn guitar <b>by feel</b>. Twelve haptic channels turn strings and frets into touch.
        Built for Deaf and hard of hearing players, and anyone who learns by doing.
      </p>

      <div class="actions anim" style="animation-delay:.42s">
        <div class="inputrow">
          <input id="link" type="text" autocomplete="off" spellcheck="false"
                 placeholder="Paste a tab or MusicXML link…" aria-label="Paste a tab or MusicXML link" />
          <button class="btn primary" id="start" type="button">Start →</button>
        </div>
      </div>

      <p class="helper anim" style="animation-delay:.5s">or play a song we already know</p>
      <div class="songs anim" style="animation-delay:.56s">
        <button class="song" type="button" data-song="riptide">
          <span class="play">▶</span>
          <span class="meta"><span class="t">Riptide</span><span class="a">Vance Joy</span></span>
        </button>
        <button class="song" type="button" data-song="twinkle">
          <span class="play">▶</span>
          <span class="meta"><span class="t">Twinkle Twinkle Little Star</span><span class="a">Traditional</span></span>
        </button>
      </div>

    </div>
  </main>

  <div class="flow" id="flow" aria-hidden="true">
    <div class="card">
      <div class="wave" id="flowWave"></div>
      <p class="ttl" id="flowTtl">Listening<span class="pink">…</span></p>
      <p class="art" id="flowArt">finding your song</p>
      <div class="pbar"><i id="flowBar"></i></div>
      <div class="steps" id="flowSteps"></div>
    </div>
  </div>

  <script>
    function go(){
      const v = (document.querySelector('#link')?.value || '').trim();
      location.href = 'glow.html' + (v ? ('?src=' + encodeURIComponent(v)) : '');
    }
    document.getElementById('start').addEventListener('click', go);
    const link = document.getElementById('link');
    link.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); go(); } });
    document.querySelectorAll('.preset').forEach(function(c){ c.addEventListener('click', go); });
    link.focus({preventScroll:true});

    // Safety net: content must never be stuck invisible. Foreground tabs run the
    // entrance animation; a backgrounded/non-rendering tab jumps straight to the end state.
    function ensureShown(){ try{ document.getAnimations().forEach(function(a){ try{ a.finish(); }catch(e){} }); }catch(e){} }
    if (document.hidden) ensureShown();
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) {/* let it play */} });
    setTimeout(ensureShown, 2200);

    // ---- featured song -> identify/progress pipeline -> glow (songs are hardcoded in songs.js) ----
    var SONGMETA = { riptide:{title:'Riptide', artist:'Vance Joy'}, twinkle:{title:'Twinkle Twinkle Little Star', artist:'Traditional'} };
    var STEPS = [
      {k:'Listening to the track', t:750},
      {k:'Fingerprinting the audio', t:1150, reveal:true},
      {k:'Pulling the guitar part', t:950},
      {k:'Mapping notes to your frets', t:900},
      {k:'Ready', t:650}
    ];
    function buildWave(){ var w=document.getElementById('flowWave'); w.innerHTML='';
      for(var i=0;i<18;i++){ var b=document.createElement('i'); b.style.animationDelay=(i*0.06)+'s';
        b.style.height=(18+Math.abs(Math.sin(i*1.3))*70)+'%'; w.appendChild(b); } }
    function startFlow(id){
      var m=SONGMETA[id]; if(!m) return;
      var flow=document.getElementById('flow'), ttl=document.getElementById('flowTtl'),
          art=document.getElementById('flowArt'), bar=document.getElementById('flowBar'),
          stepsEl=document.getElementById('flowSteps');
      buildWave();
      ttl.innerHTML='Listening<span class="pink">…</span>'; art.textContent='finding your song'; bar.style.width='2%';
      stepsEl.innerHTML = STEPS.map(function(s,i){
        return '<div class="step" id="fs'+i+'"><span class="ic">'+(i+1)+'</span>'+s.k+'<span class="res" id="fr'+i+'"></span></div>'; }).join('');
      flow.classList.add('show'); flow.setAttribute('aria-hidden','false');
      var total=STEPS.reduce(function(a,s){return a+s.t;},0), acc=0, n=0;
      (function run(){
        if(n>=STEPS.length){ location.href='glow.html?song='+id; return; }
        var s=STEPS[n], el=document.getElementById('fs'+n); el.classList.add('on');
        if(s.reveal){ ttl.innerHTML='Identifying<span class="pink">…</span>'; }
        setTimeout(function(){
          el.classList.add('done'); el.querySelector('.ic').textContent='✓';
          if(s.reveal){ document.getElementById('fr'+n).textContent='✓ '+m.title;
            ttl.innerHTML='Found <span class="pink">'+m.title+'</span>'; art.textContent=m.artist; }
          acc+=s.t; bar.style.width=Math.round(2+acc/total*98)+'%';
          n++; run();
        }, s.t);
      })();
    }
    var songBtns=document.querySelectorAll('.song');
    for(var bi=0;bi<songBtns.length;bi++){ songBtns[bi].addEventListener('click', (function(b){ return function(){ startFlow(b.getAttribute('data-song')); }; })(songBtns[bi])); }
    window.__startFlow=startFlow;   // test hook
  </script>
</body>
</html>
