<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TACTUS · LEARN — Teleprompter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --ivory:#FFFBF6; --ink:#3A2A4A; --berry:#FF4D8D; --line:#FBD9E6;
    --peach:#FFE3D1; --mint:#D6F7E6; --lav:#E7DBFF; --grape:#AD7FFF; --tangy:#FF9F43;
    --s1:#FF6B6B; --s2:#FF9F43; --s3:#FFD635; --s4:#26DEA0; --s5:#48B6FF; --s6:#AD7FFF;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:"Nunito",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 620px at 8% -6%, var(--peach) 0%, rgba(255,227,209,0) 60%),
      radial-gradient(820px 640px at 102% 14%, var(--lav) 0%, rgba(231,219,255,0) 58%),
      radial-gradient(1000px 780px at 88% 108%, var(--mint) 0%, rgba(214,247,230,0) 60%),
      radial-gradient(760px 560px at 18% 112%, #FFE9F1 0%, rgba(255,233,241,0) 62%),
      var(--ivory);
    overflow:hidden;
  }
  .screen{ position:absolute; inset:0; }
  .hide{ display:none !important; }

  /* ---------- Brand ---------- */
  .brand{ display:inline-flex; align-items:center; gap:10px; }
  .brand .wm{ font-family:"Fredoka",sans-serif; font-weight:700; font-size:24px; letter-spacing:.01em; color:var(--ink); }
  .brand .dot{ color:var(--berry); font-weight:700; }
  .pill-learn{
    font-family:"Nunito",sans-serif; font-weight:900; font-size:11px; letter-spacing:.1em;
    color:#7A3D00; background:linear-gradient(180deg,#FFD24D,#FF9F43);
    padding:4px 10px; border-radius:999px; border:2px solid #FFC766;
    box-shadow:0 2px 0 #E08A1E;
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:"Nunito",sans-serif; font-weight:800; font-size:15px;
    border-radius:999px; border:2.5px solid #FFB8D4; background:#FFFFFFe6; color:#7A2A52;
    box-shadow:0 4px 0 #FFD9E8, 0 8px 16px #ff4d8d1f;
    padding:13px 22px; cursor:pointer; transition:transform .08s ease, box-shadow .08s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #FFD9E8, 0 4px 10px #ff4d8d1f; }
  .btn.primary{
    background:linear-gradient(180deg,#FF6FA3,#FF4D8D); color:#fff; border-color:#FF6FA3;
    box-shadow:0 4px 0 #C9356C, 0 8px 16px #ff4d8d33;
  }
  .btn.primary:active{ box-shadow:0 1px 0 #C9356C, 0 4px 10px #ff4d8d33; }
  .btn.ghost{ font-size:14px; padding:9px 16px; }

  /* ---------- Landing ---------- */
  #landing{ display:flex; flex-direction:column; }
  .top{ padding:26px 34px; }
  .hero{ flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 24px 60px; }
  .hero h1{
    font-family:"Fredoka",sans-serif; font-weight:700; margin:0 0 14px;
    font-size:clamp(44px,7.4vw,84px); line-height:1.02; letter-spacing:-.01em; color:var(--ink);
  }
  .hero h1 .any{ color:var(--berry); }
  .hero .sub{
    font-size:clamp(16px,1.7vw,20px); font-weight:600; color:#6B5A78;
    max-width:560px; margin:0 0 30px; line-height:1.45;
  }
  .inputrow{
    display:flex; align-items:center; gap:12px; width:min(620px,92vw);
    background:#fff; border:2.5px solid var(--line); border-radius:999px;
    padding:7px 7px 7px 22px; box-shadow:0 6px 0 #FCEAF1, 0 16px 30px #ad7fff14;
  }
  .inputrow input{
    flex:1; border:0; outline:0; background:transparent;
    font-family:"Nunito",sans-serif; font-weight:700; font-size:16px; color:var(--ink);
  }
  .inputrow input::placeholder{ color:#C4A9D6; font-weight:600; }
  .chips{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:26px; }
  .chip{
    font-family:"Nunito",sans-serif; font-weight:800; font-size:14px; color:#5A3F6E;
    background:#fff; border:2.5px solid var(--lav); border-radius:999px;
    padding:10px 18px; cursor:pointer; box-shadow:0 4px 0 #EDE4FF; transition:transform .08s ease,box-shadow .08s ease;
  }
  .chip:active{ transform:translateY(3px); box-shadow:0 1px 0 #EDE4FF; }
  .chip:nth-child(2){ border-color:var(--mint); box-shadow:0 4px 0 #CBF1E0; }
  .chip:nth-child(3){ border-color:var(--peach); box-shadow:0 4px 0 #FFD9C0; }
  .helper{ margin-top:22px; font-size:13px; font-weight:700; color:#A892BC; }
  .helper i{ font-style:normal; color:var(--grape); }

  /* ---------- Game ---------- */
  #cam{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #faux{ position:absolute; inset:0; width:100%; height:100%; z-index:0; }
  .game-brand{ position:absolute; top:148px; left:22px; z-index:6;
    background:#FFFBF6cc; backdrop-filter:blur(8px); padding:7px 12px; border-radius:999px; border:2px solid #ffffff80; }
  .game-brand .wm{ font-size:18px; }
  .status{
    position:absolute; top:150px; left:50%; transform:translateX(-50%); z-index:6;
    display:inline-flex; align-items:center; gap:7px;
    font-family:"Nunito",sans-serif; font-weight:800; font-size:13px; color:#0E7A56;
    background:#E6FBF1e6; border:2px solid #B6F0D6; border-radius:999px; padding:7px 14px;
    box-shadow:0 4px 12px #26dea024;
  }
  .status .blob{ width:9px; height:9px; border-radius:50%; background:#26DEA0; box-shadow:0 0 0 4px #26dea033; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.55; transform:scale(.8);} }
  .back{ position:absolute; top:148px; right:22px; z-index:6; }

  /* ---------- Teleprompter ribbon (top edge) ---------- */
  .ribbon{
    position:absolute; top:0; left:0; right:0; height:122px; z-index:5;
    background:linear-gradient(180deg, #FFFBF6f2, #FFFBF6d9);
    backdrop-filter:blur(14px) saturate(1.1); -webkit-backdrop-filter:blur(14px) saturate(1.1);
    border-bottom:2px solid var(--line);
    box-shadow:0 8px 26px #ad7fff14;
    display:flex; align-items:stretch; overflow:hidden;
  }
  .ribbon-meta{
    flex:0 0 162px; display:flex; flex-direction:column; justify-content:center;
    padding:0 18px; border-right:2px dashed var(--line); position:relative; z-index:3; background:#FFFBF6e0;
  }
  .ribbon-meta .now{ font-size:11px; font-weight:900; letter-spacing:.14em; color:#C28AB0; text-transform:uppercase; }
  .ribbon-meta .chord{ font-family:"Fredoka",sans-serif; font-weight:700; font-size:46px; line-height:.96; color:var(--berry); }
  .ribbon-meta .bpm{ margin-top:4px; font-size:12px; font-weight:800; color:#8A76A0; }
  .ribbon-meta .bpm b{ color:var(--grape); }

  .lanes{ position:relative; flex:1; overflow:hidden; }
  .grid-svg{ position:absolute; inset:0; width:100%; height:100%; }
  .scroller{ position:absolute; inset:0; }
  .scroll-inner{ position:absolute; top:0; left:0; height:100%; width:200%; animation:scroll 9s linear infinite; }
  @keyframes scroll{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }

  .bar{ position:absolute; top:8px; bottom:8px; width:2px; background:repeating-linear-gradient(#E9D7F2 0 6px, transparent 6px 12px); }
  .token{
    position:absolute; transform:translateY(-50%);
    height:20px; min-width:26px; padding:0 9px; border-radius:999px;
    display:flex; align-items:center; justify-content:center;
    font-family:"Nunito",sans-serif; font-weight:900; font-size:12px; color:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.16), inset 0 1px 0 #ffffff66;
    border:1.5px solid #ffffff7a;
  }
  .playhead{
    position:absolute; top:0; bottom:0; left:30%; width:3px; z-index:4;
    background:linear-gradient(180deg,#FF6FA3,#FF4D8D);
    box-shadow:0 0 14px 3px #ff4d8d80, 0 0 4px #ff4d8d;
    border-radius:3px;
  }
  .playhead::before{
    content:""; position:absolute; top:-1px; left:50%; transform:translateX(-50%);
    width:13px; height:13px; border-radius:50%;
    background:#FF4D8D; box-shadow:0 0 12px 3px #ff4d8d99; border:2px solid #fff;
  }
  .strnames{ position:absolute; left:6px; top:0; bottom:0; width:16px; z-index:3; pointer-events:none; }
  .strnames span{ position:absolute; transform:translateY(-50%); font-family:"Fredoka",sans-serif; font-weight:600; font-size:11px; }

  /* faux AR note cells (lower neck) */
  .ar-cell{
    position:absolute; border-radius:11px; display:flex; align-items:center; justify-content:center;
    font-family:"Fredoka",sans-serif; font-weight:700; font-size:18px; color:#fff;
    border:2px solid #ffffffcc; z-index:4;
    animation:cellpulse 1.6s ease-in-out infinite;
  }
  @keyframes cellpulse{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.18);} }
</style>
</head>
<body>

<!-- ============ LANDING ============ -->
<section class="screen" id="landing">
  <div class="top">
    <div class="brand"><span class="wm">TACTUS</span><span class="dot">·</span><span class="pill-learn">LEARN</span></div>
  </div>
  <div class="hero">
    <h1>Learn <span class="any">any</span> song.</h1>
    <p class="sub">Paste a link to your sheet music — we turn it into a live, on-your-guitar game.</p>
    <div class="inputrow">
      <input id="link" type="text" placeholder="Paste a tab or MusicXML link…" />
      <button class="btn primary" onclick="go()">Start →</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="go()">🎸 Tactus Etude</button>
      <button class="chip" onclick="go()">🌧 Wonderwall</button>
      <button class="chip" onclick="go()">🥁 Seven Nation Army</button>
    </div>
    <div class="helper">works with <i>Guitar Pro</i> / <i>MusicXML</i> links</div>
  </div>
</section>

<!-- ============ GAME ============ -->
<section class="screen hide" id="game">
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="faux"></canvas>

  <!-- teleprompter ribbon -->
  <div class="ribbon">
    <div class="ribbon-meta">
      <div class="now">Now playing</div>
      <div class="chord" id="chordName">G</div>
      <div class="bpm">♩ = <b>92</b> bpm</div>
    </div>
    <div class="lanes">
      <svg class="grid-svg" id="grid" preserveAspectRatio="none"></svg>
      <div class="strnames" id="strnames"></div>
      <div class="scroller">
        <div class="scroll-inner" id="scrollInner"></div>
      </div>
      <div class="playhead"></div>
    </div>
  </div>

  <!-- game chrome -->
  <div class="game-brand"><div class="brand"><span class="wm">TACTUS</span><span class="dot">·</span><span class="pill-learn">LEARN</span></div></div>
  <div class="status"><span class="blob"></span>auto-locked ✓</div>
  <button class="btn ghost back" onclick="back()">‹ back</button>
</section>

<script>
const STR=[
  {n:'e',c:'#FF6B6B'},{n:'B',c:'#FF9F43'},{n:'G',c:'#FFD635'},
  {n:'D',c:'#26DEA0'},{n:'A',c:'#48B6FF'},{n:'E',c:'#AD7FFF'}
];

/* ---------- screen switching ---------- */
function go(){ document.getElementById('landing').classList.add('hide'); document.getElementById('game').classList.remove('hide'); startCam(); }
function back(){ document.getElementById('game').classList.add('hide'); document.getElementById('landing').classList.remove('hide'); }

/* ---------- ribbon build ---------- */
function buildRibbon(){
  const H=122, pad=10, lanesEl=document.querySelector('.lanes');
  const w=lanesEl.clientWidth||980, h=H;
  const yOf=i=> pad + (h-2*pad)*(i/(STR.length-1));

  /* string lines + faint bar dividers (svg, drawn behind tokens) */
  const grid=document.getElementById('grid');
  grid.setAttribute('viewBox',`0 0 ${w} ${h}`);
  let g='';
  for(let b=0;b<6;b++){ const x=(w/6)*b; g+=`<line x1="${x}" y1="6" x2="${x}" y2="${h-6}" stroke="#F0E2F7" stroke-width="1.5"/>`; }
  STR.forEach((s,i)=>{ g+=`<line x1="0" y1="${yOf(i)}" x2="${w}" y2="${yOf(i)}" stroke="${s.c}" stroke-opacity=".5" stroke-width="2.5" stroke-linecap="round"/>`; });
  grid.innerHTML=g;

  /* string name letters at far left */
  const names=document.getElementById('strnames'); let nm='';
  STR.forEach((s,i)=>{ nm+=`<span style="top:${yOf(i)}px;color:${s.c}">${s.n}</span>`; });
  names.innerHTML=nm;

  /* scrolling note tokens — a looping G Em C D phrase, duplicated for seamless wrap */
  const phrase=[
    {b:0, str:5, f:3},{b:0, str:4, f:2},{b:0, str:0, f:3},
    {b:1, str:5, f:0},{b:1, str:3, f:2},{b:1, str:1, f:0},
    {b:2, str:4, f:3},{b:2, str:3, f:2},{b:2, str:0, f:0},
    {b:3, str:3, f:0},{b:3, str:2, f:2},{b:3, str:0, f:2}
  ];
  const span=w;            // one full phrase spans the lane width
  const inner=document.getElementById('scrollInner');
  let html='';
  for(let rep=0; rep<2; rep++){
    const ox=rep*span;
    for(let b=0;b<4;b++){ html+=`<div class="bar" style="left:${ox + (span/4)*b}px"></div>`; }
    phrase.forEach(p=>{
      const x=ox + (span/4)*p.b + (span/4)*0.30 + (p.f? 8:0);
      const y=yOf(p.str), c=STR[p.str].c;
      html+=`<div class="token" style="left:${x}px; top:${y}px; background:${c}">${p.f}</div>`;
    });
  }
  inner.innerHTML=html;
}

/* ---------- faux AR neck + glow note-cells (lower third) ---------- */
function drawFaux(){
  const cv=document.getElementById('faux'), v=document.getElementById('cam');
  if(v && v.srcObject){ cv.style.display='none'; return; }
  cv.style.display='block';
  const w=cv.width=cv.clientWidth, h=cv.height=cv.clientHeight;
  const x=cv.getContext('2d');

  /* warm out-of-focus room */
  let bg=x.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#5b4636'); bg.addColorStop(.5,'#735843'); bg.addColorStop(1,'#3c2e24');
  x.fillStyle=bg; x.fillRect(0,0,w,h);
  const blobs=[['#caa06a',.18,.26,.30],['#8f6f4e',.78,.34,.34],['#a07e57',.5,.7,.5],['#6b513a',.12,.8,.4]];
  blobs.forEach(([col,cx,cy,r])=>{ const g=x.createRadialGradient(w*cx,h*cy,0,w*cx,h*cy,w*r); g.addColorStop(0,col+'aa'); g.addColorStop(1,col+'00'); x.fillStyle=g; x.beginPath(); x.arc(w*cx,h*cy,w*r,0,7); x.fill(); });

  /* head/shoulders silhouette near TOP-CENTER (player's face), softly behind ribbon */
  x.save(); x.fillStyle='rgba(28,20,34,.5)'; x.filter='blur(6px)';
  x.beginPath(); x.ellipse(w*0.5, h*0.16, w*0.078, h*0.115, 0, 0, 7); x.fill();   /* head */
  x.beginPath(); x.ellipse(w*0.5, h*0.42, w*0.30, h*0.20, 0, Math.PI, 2*Math.PI); x.fill(); /* shoulders */
  x.restore();

  /* ---- guitar neck crossing LOWER THIRD at slight angle (nut lower-left) ---- */
  const nutX=w*0.06, nutY=h*0.93, endX=w*0.99, endY=h*0.62; /* neck axis */
  const nW=h*0.20; /* perpendicular half-width near body */
  const ux=endX-nutX, uy=endY-nutY, ul=Math.hypot(ux,uy); const px=-uy/ul, py=ux/ul;
  const wN=h*0.085; /* nut half-width (narrower) */
  const corners=[
    [nutX+px*wN, nutY+py*wN],[endX+px*nW, endY+py*nW],
    [endX-px*nW, endY-py*nW],[nutX-px*wN, nutY-py*wN]
  ];
  /* fretboard */
  let fb=x.createLinearGradient(nutX,nutY,endX,endY); fb.addColorStop(0,'#3b2416'); fb.addColorStop(1,'#23150c');
  x.fillStyle=fb; x.beginPath(); x.moveTo(corners[0][0],corners[0][1]); corners.slice(1).forEach(c=>x.lineTo(c[0],c[1])); x.closePath(); x.fill();
  /* nut */
  x.strokeStyle='#e9dcc4'; x.lineWidth=6; x.beginPath(); x.moveTo(corners[0][0],corners[0][1]); x.lineTo(corners[3][0],corners[3][1]); x.stroke();

  /* fret wires (perspective grid) */
  const frets=[0.04,0.13,0.24,0.37,0.52,0.69,0.88];
  function axis(t){ return [nutX+ux*t, nutY+uy*t]; }
  function halfW(t){ return wN+(nW-wN)*t; }
  x.strokeStyle='#c9b48f'; x.lineWidth=3;
  frets.forEach(t=>{ const [ax,ay]=axis(t), hw=halfW(t); x.beginPath(); x.moveTo(ax+px*hw,ay+py*hw); x.lineTo(ax-px*hw,ay-py*hw); x.stroke(); });

  /* 6 colored strings along the neck */
  STR.forEach((s,i)=>{
    const off=(i/(STR.length-1)-0.5)*2; /* -1..1 */
    const a=[nutX+px*(wN*off*0.82), nutY+py*(wN*off*0.82)];
    const b=[endX+px*(nW*off*0.92), endY+py*(nW*off*0.92)];
    x.strokeStyle=s.c; x.globalAlpha=.92; x.lineWidth=2 + i*0.35;
    x.shadowColor=s.c; x.shadowBlur=6;
    x.beginPath(); x.moveTo(a[0],a[1]); x.lineTo(b[0],b[1]); x.stroke();
  });
  x.globalAlpha=1; x.shadowBlur=0;

  /* ---- glowing AR note-cells on the neck (rhythm cue, lower region) ---- */
  const cells=[ {fr:1,str:4,f:'3'},{fr:3,str:3,f:'2'},{fr:4,str:0,f:'0'} ];
  cells.forEach(c=>{
    const t=(frets[c.fr]+frets[c.fr+1])/2;
    const [ax,ay]=axis(t), hw=halfW(t);
    const off=(c.str/(STR.length-1)-0.5)*2;
    const cx=ax+px*hw*off*0.86, cy=ay+py*hw*off*0.86;
    const col=STR[c.str].c, sz=Math.max(26, h*0.05);
    x.save(); x.translate(cx,cy);
    x.shadowColor=col; x.shadowBlur=26;
    x.fillStyle=col+'f2';
    roundRect(x,-sz/2,-sz*0.36,sz,sz*0.72,11); x.fill();
    x.shadowBlur=0; x.lineWidth=2.5; x.strokeStyle='#ffffffdd';
    roundRect(x,-sz/2,-sz*0.36,sz,sz*0.72,11); x.stroke();
    x.fillStyle='#fff'; x.font=`700 ${Math.round(sz*0.5)}px Fredoka, sans-serif`;
    x.textAlign='center'; x.textBaseline='middle'; x.fillText(c.f,0,1);
    x.restore();
  });
}
function roundRect(x,a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }

/* ---------- camera (real if possible, else faux) ---------- */
async function startCam(){
  buildRibbon();
  const v=document.getElementById('cam');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=stream; document.getElementById('faux').style.display='none';
  }catch(e){
    v.style.display='none';
    drawFaux();
  }
  cycleChord();
}

/* ---------- gentle chord cycling to feel alive ---------- */
const CHORDS=['G','Em','C','D']; let ci=0;
function cycleChord(){
  clearInterval(window._cc);
  window._cc=setInterval(()=>{ ci=(ci+1)%CHORDS.length; document.getElementById('chordName').textContent=CHORDS[ci]; }, 2250);
}

/* redraw faux + ribbon on resize */
let rT; window.addEventListener('resize',()=>{ clearTimeout(rT); rT=setTimeout(()=>{ if(!document.getElementById('game').classList.contains('hide')){ buildRibbon(); drawFaux(); } },150); });
</script>
</body>
</html>
