<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tactus — LEARN</title>
<!--
  Runnable mock of the LEARN interface (docs/16-learn-interface.md).
  - No backend: a mock engine emits the SAME WebSocket messages the real
    laptop engine (docs/08) will send: reference | frame | note | error.
  - Body map = the as-built 14 channels (config/channel_map.json):
    6 chest strings (high-E top -> low-E bottom) + 6 forearm fret-zones
    (z1 near-nut -> z6 elbow) + 2 reserved back zones.
  - Swap `MockEngine` for `new WebSocket(url)` and nothing else changes.
  Open this file directly in a browser. Allow the camera for the live feed
  (optional — falls back to a drawn fretboard).
-->
<style>
  :root{
    --bg:#0a0d12; --panel:#121821; --panel2:#0e141c; --line:#1f2a37;
    --ink:#e8eef6; --dim:#8aa0b6; --accent:#39d0d8;
    --string:#5aa0ff; --fret:#ffb14e; --back:#3a4a5e; --bad:#ff4d5e; --good:#3ee08f;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.4 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  .app{display:grid;height:100vh;
    grid-template-columns:1.55fr 1fr;
    grid-template-rows:auto 1fr auto;
    grid-template-areas:"top top" "cam side" "high high";gap:10px;padding:10px}
  .top{grid-area:top}.cam{grid-area:cam}.side{grid-area:side}.high{grid-area:high}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px}
  .top{display:flex;align-items:center;gap:14px;padding:10px 14px}
  .top h1{font-size:15px;margin:0;letter-spacing:.5px}
  .top h1 b{color:var(--accent)}
  .pill{font:12px/1 var(--mono);color:var(--dim);background:var(--panel2);
    border:1px solid var(--line);padding:6px 9px;border-radius:999px}
  .pill.on{color:var(--good);border-color:#1c4a36}
  .spacer{flex:1}
  button{font:13px/1 inherit;color:var(--ink);background:#17202c;
    border:1px solid var(--line);padding:8px 12px;border-radius:8px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.key{border-color:#1e5b5f}
  .cam{position:relative;overflow:hidden;display:flex}
  .cam canvas,.cam video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cam .lbl{position:absolute;left:12px;top:10px;z-index:3;font:12px/1 var(--mono);
    color:var(--dim);background:#0009;padding:6px 8px;border-radius:6px}
  .side{display:grid;grid-template-rows:1fr auto;gap:10px;min-height:0}
  .bodywrap{position:relative;min-height:0}
  .bodywrap canvas{width:100%;height:100%;display:block}
  .corr{padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel2)}
  .corr.idle{color:var(--dim)}
  .corr .row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .tag{font:11px/1 var(--mono);padding:4px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
  .tag.note{background:#3a1e22;color:var(--bad)}
  .tag.duration{background:#3a2e16;color:var(--fret)}
  .tag.pressure{background:#16303a;color:var(--accent)}
  .corr .fix{font-size:15px;margin:6px 0}
  .corr .ab{font:12px/1.5 var(--mono);color:var(--dim)}
  .corr .ab .x{color:var(--bad)}.corr .ab .y{color:var(--good)}
  .high{height:150px;padding:0;position:relative}
  .high canvas{width:100%;height:100%;display:block;border-radius:12px}
  .high .now{position:absolute;top:0;bottom:0;left:22%;width:2px;background:var(--accent);opacity:.7}
  .legend{position:absolute;right:12px;top:8px;font:11px/1.6 var(--mono);color:var(--dim)}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:-1px}
</style>
</head>
<body>
<div class="app">

  <div class="top card">
    <h1><b>TACTUS</b> · LEARN</h1>
    <span class="pill" id="song">— no song —</span>
    <span class="pill" id="seg">segment 0</span>
    <span class="pill" id="bpm">— bpm</span>
    <div class="spacer"></div>
    <span class="pill on" id="mode">Mode A · wall</span>
    <span class="pill on" id="offline">offline ✓ (redis)</span>
    <button class="key" id="bTarget">▶ feel target</button>
    <button id="bMine">feel mine</button>
    <button id="bRewind">⟲ rewind</button>
    <button id="bPlay">⏸ pause</button>
  </div>

  <div class="cam card">
    <video id="vid" autoplay playsinline muted></video>
    <canvas id="camcv"></canvas>
    <div class="lbl" id="camlbl">vision: MediaPipe hands · ArUco fretboard</div>
  </div>

  <div class="side">
    <div class="card bodywrap"><canvas id="bodycv"></canvas></div>
    <div class="corr idle" id="corr">
      <div class="row"><span class="tag">no error</span> playing clean — keep going</div>
      <div class="ab">target: <span class="y">—</span> &nbsp; you: <span class="x">—</span></div>
    </div>
  </div>

  <div class="high card">
    <canvas id="highcv"></canvas>
    <div class="now"></div>
    <div class="legend">
      <div><i style="background:#5aa0ff"></i>string (chest)</div>
      <div><i style="background:#ffb14e"></i>fret (forearm)</div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// THE CONTRACT (docs/16 §3). drive[] index = wiring-map ch 1..12:
//   0..5  = strings 1..6  (chest, high-E -> low-E)
//   6..11 = fret-zones z1..z6 (forearm, near-nut -> elbow)
// ============================================================================
// 12 channels = 6 SK473 boxes x stereo (L,R): 6 chest strings + 6 forearm fret-zones.
const SITES = [
  {name:"E (high)", zone:"string"}, {name:"B", zone:"string"}, {name:"G", zone:"string"},
  {name:"D", zone:"string"},        {name:"A", zone:"string"}, {name:"E (low)", zone:"string"},
  {name:"z1", zone:"fret"}, {name:"z2", zone:"fret"}, {name:"z3", zone:"fret"},
  {name:"z4", zone:"fret"}, {name:"z5", zone:"fret"}, {name:"z6", zone:"fret"}
];
const COL = {string:"#5aa0ff", fret:"#ffb14e", back:"#3a4a5e"};

// fret -> (zone index 0..5, intensity level). 2 frets per zone. (docs/07)
function fretToZone(fret){
  if(fret<=0) return null;                 // open string: no fret zone
  const z = Math.min(5, Math.floor((fret-1)/2));
  const hi = ((fret-1)%2)===1;
  return {z, level: hi?1.0:0.6};
}

// ---- a tiny demo song (string is 1..6 = high..low; fret 0..12) -------------
const SONG = {song:"Seven Nation Army (riff)", bpm:120, notes:[]};
(function(){
  const seq = [ [5,0],[5,0],[5,3],[5,0],[4,2],[5,0],[5,1],[5,0] ]; // string,fret
  let t=0; const dt=0.42;
  for(let r=0;r<6;r++) for(const [s,f] of seq){
    SONG.notes.push({t:+t.toFixed(2), string:s, fret:f,
      finger: f===0?"open":["index","middle","ring","pinky"][Math.min(3,Math.ceil(f/2)-1)],
      dur:dt*0.8});
    t+=dt;
  }
})();

// ============================================================================
// MOCK ENGINE — emits the same messages a real WebSocket would (docs/16 §3).
// Replace with:  const ws = new WebSocket(url); ws.onmessage = e => handle(JSON.parse(e.data));
// ============================================================================
class MockEngine{
  constructor(onmsg){ this.onmsg=onmsg; this.t=0; this.playing=true;
    this.drive=new Array(12).fill(0); this.errTimer=0;
    onmsg({type:"reference", ...SONG});
  }
  cmd(c){
    if(c==="rewind") this.t=Math.max(0,this.t-2.2);
    if(c==="slower") SONG.bpm=Math.max(50,SONG.bpm-15);
    if(c==="feel_target"||c==="feel_mine"){ this.pulseAll(); }
    if(c==="play") this.playing=!this.playing;
  }
  pulseAll(){ for(let i=0;i<6;i++) this.drive[i]=0.8; }
  step(dt){
    if(!this.playing) return;
    this.t += dt;
    // decay drive
    for(let i=0;i<12;i++) this.drive[i]*=Math.pow(0.001, dt); // fast decay
    // fire notes whose onset we just crossed
    for(const n of SONG.notes){
      if(n._fired) continue;
      if(this.t>=n.t && this.t<n.t+0.05){
        n._fired=true;
        // light the string channel
        this.drive[n.string-1]=0.95;
        const fz=fretToZone(n.fret);
        if(fz) this.drive[6+fz.z]=fz.level;
        // ~22% of the time, simulate a fault -> error message
        const bad = (Math.floor(n.t*10)%9)===0;
        this.onmsg({type:"note", t:n.t, string:n.string, fret:n.fret,
                    velocity:0.8, correct:!bad});
        if(bad) this.emitError(n);
      }
    }
    // loop the song
    if(this.t > SONG.notes[SONG.notes.length-1].t + 1.0){
      this.t=0; SONG.notes.forEach(n=>n._fired=false);
    }
    this.onmsg({type:"frame", t:+this.t.toFixed(2), drive:this.drive.slice(),
                segment: Math.floor(this.t/3)});
  }
  emitError(n){
    const cats=["note","duration","pressure"];
    const cat=cats[Math.floor(n.t*7)%3];
    const fixes={
      note:`Wrong note — that's not the ${["","high E","B","G","D","A","low E"][n.string]} you want here. Ring finger to fret ${Math.max(1,n.fret)}.`,
      duration:`You're rushing — hold it for the full beat, let it ring.`,
      pressure:`Press just behind fret ${Math.max(1,n.fret)} — you're on top of the wire, it buzzed.`
    };
    this.onmsg({type:"error", t:n.t, category:cat,
      target:{string:n.string, fret:n.fret, finger:n.finger},
      measured:{string:n.string, fret:n.fret, quality: cat==="pressure"?"buzz":"clean"},
      finger_to_highlight:n.finger,
      fix_text:fixes[cat]});
  }
}

// ============================================================================
// UI
// ============================================================================
const state={drive:new Array(12).fill(0), error:null, errorUntil:0, notePtr:0};
const el = id => document.getElementById(id);

function handle(m){
  if(m.type==="reference"){ el("song").textContent=m.song; el("bpm").textContent=m.bpm+" bpm"; }
  if(m.type==="frame"){ state.drive=m.drive; el("seg").textContent="segment "+m.segment; }
  if(m.type==="error"){ state.error=m; state.errorUntil=performance.now()+2600; renderCorrection(m); }
  if(m.type==="note"){ /* could flash highway */ }
}
function renderCorrection(m){
  const c=el("corr"); c.classList.remove("idle");
  c.innerHTML =
    `<div class="row"><span class="tag ${m.category}">${m.category}</span>`+
    `<b>${m.finger_to_highlight} finger</b></div>`+
    `<div class="fix">${m.fix_text}</div>`+
    `<div class="ab">target: <span class="y">str ${m.target.string} · fret ${m.target.fret} · ${m.target.finger}</span><br>`+
    `you: <span class="x">str ${m.measured.string} · fret ${m.measured.fret} · ${m.measured.quality}</span></div>`+
    `<div class="row" style="margin-top:8px"><button class="key" onclick="eng.cmd('feel_target')">▶ feel the difference</button></div>`;
}
function clearCorrection(){
  const c=el("corr"); c.classList.add("idle");
  c.innerHTML=`<div class="row"><span class="tag">no error</span> playing clean — keep going</div>`+
    `<div class="ab">target: <span class="y">—</span> &nbsp; you: <span class="x">—</span></div>`;
}

// ---- body map canvas -------------------------------------------------------
function drawBody(){
  const cv=el("bodycv"), ctx=cv.getContext("2d");
  const w=cv.width=cv.clientWidth*devicePixelRatio, h=cv.height=cv.clientHeight*devicePixelRatio;
  ctx.clearRect(0,0,w,h); ctx.save(); ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=cv.clientWidth, H=cv.clientHeight;
  ctx.fillStyle="#9fb3c8"; ctx.font="11px ui-monospace,monospace";
  ctx.fillText("BODY MAP — what the wearer feels (12 ch)", 12, 16);

  // torso silhouette
  ctx.strokeStyle="#26323f"; ctx.lineWidth=2;
  roundRect(ctx, W*0.30, 34, W*0.40, H-70, 22); ctx.stroke();

  // 6 chest string dots (column, high-E top -> low-E bottom)
  const cx=W*0.50; const top=58; const gap=(H-118)/5;
  for(let i=0;i<6;i++) node(ctx, cx, top+i*gap, state.drive[i], "string", SITES[i].name);

  // 6 forearm fret zones (a slanted arm to the right, near-nut -> elbow)
  for(let i=0;i<6;i++){
    const x=W*0.80, y=58+i*((H-118)/5);
    node(ctx, x, y, state.drive[6+i], "fret", "z"+(i+1));
  }
  ctx.restore();

  function node(ctx,x,y,v,zone,label){
    const r=10+v*9; const c=COL[zone];
    ctx.beginPath(); ctx.arc(x,y,r,0,7);
    ctx.fillStyle=zone==="back"?"#1a2330":hexA(c, .15+v*.85); ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle=zone==="back"?"#2a3a4a":c; ctx.stroke();
    ctx.fillStyle="#7d92a6"; ctx.font="10px ui-monospace,monospace";
    ctx.fillText(label, x+14, y+3);
  }
}

// ---- note highway canvas ---------------------------------------------------
function drawHighway(t){
  const cv=el("highcv"), ctx=cv.getContext("2d");
  const w=cv.width=cv.clientWidth*devicePixelRatio, h=cv.height=cv.clientHeight*devicePixelRatio;
  ctx.clearRect(0,0,w,h); ctx.save(); ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=cv.clientWidth,H=cv.clientHeight;
  const nowX=W*0.22, pxPerSec=150, laneH=(H-18)/6;
  // 6 string lanes
  for(let s=0;s<6;s++){ ctx.strokeStyle="#172230"; ctx.beginPath();
    ctx.moveTo(0,14+s*laneH+laneH/2); ctx.lineTo(W,14+s*laneH+laneH/2); ctx.stroke();
    ctx.fillStyle="#3f5163"; ctx.font="10px ui-monospace,monospace";
    ctx.fillText(["E","B","G","D","A","E"][s],4,18+s*laneH+laneH/2); }
  // notes
  for(const n of SONG.notes){
    const x=nowX+(n.t-t)*pxPerSec; if(x<-30||x>W+30) continue;
    const y=14+(n.string-1)*laneH+laneH/2;
    const past = n.t < t-0.05;
    ctx.fillStyle = past? "#22303d" : (x<nowX+6? "#39d0d8" : "#cfe0fc");
    roundRect(ctx, x-13, y-9, 26, 18, 6); ctx.fill();
    ctx.fillStyle = past? "#3f5163" : "#0a0d12"; ctx.font="bold 11px ui-monospace,monospace";
    ctx.textAlign="center"; ctx.fillText(n.fret, x, y+4); ctx.textAlign="left";
  }
  ctx.restore();
}

// ---- camera + hand overlay -------------------------------------------------
let HAND=null;
function drawCam(t){
  const cv=el("camcv"), ctx=cv.getContext("2d");
  const w=cv.width=cv.clientWidth*devicePixelRatio, h=cv.height=cv.clientHeight*devicePixelRatio;
  ctx.save(); ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=cv.clientWidth,H=cv.clientHeight;
  if(!HAS_VIDEO){ // drawn fretboard fallback
    ctx.fillStyle="#0c1219"; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle="#243240"; ctx.lineWidth=2;
    for(let s=0;s<6;s++){ const y=H*0.25+s*H*0.1; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    for(let f=0;f<6;f++){ const x=W*0.12+f*W*0.16; ctx.strokeStyle="#2f4150"; ctx.beginPath(); ctx.moveTo(x,H*0.2); ctx.lineTo(x,H*0.78); ctx.stroke(); }
  }
  // a simple animated "hand" skeleton + finger highlight when an error is live
  const wob=Math.sin(t*2)*6;
  const palm={x:W*0.42, y:H*0.62+wob};
  const fingers=[ {n:"index",dx:-30,dy:-90},{n:"middle",dx:0,dy:-104},
                  {n:"ring",dx:30,dy:-96},{n:"pinky",dx:58,dy:-74} ];
  ctx.strokeStyle="#7fe9ef"; ctx.lineWidth=2; ctx.fillStyle="#7fe9ef";
  dot(palm.x,palm.y,4);
  const err = (state.error && performance.now()<state.errorUntil) ? state.error : null;
  for(const f of fingers){
    const tip={x:palm.x+f.dx, y:palm.y+f.dy};
    ctx.beginPath(); ctx.moveTo(palm.x,palm.y); ctx.lineTo(tip.x,tip.y); ctx.stroke();
    dot(tip.x,tip.y,4);
    if(err && err.finger_to_highlight===f.n){
      ctx.strokeStyle="#ff4d5e"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(tip.x,tip.y,16,0,7); ctx.stroke();
      ctx.fillStyle="#ff4d5e"; ctx.font="bold 11px ui-monospace,monospace";
      ctx.fillText(f.n+" ✗", tip.x+18, tip.y);
      // ghost = where it should go (a nudge toward the fret)
      ctx.strokeStyle="#3ee08f"; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.arc(tip.x, tip.y+22, 13,0,7); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle="#3ee08f"; ctx.fillText("✓ here", tip.x+16, tip.y+26);
      ctx.strokeStyle="#7fe9ef"; ctx.fillStyle="#7fe9ef";
    }
  }
  el("camlbl").textContent = err ? `coach: highlight ${err.finger_to_highlight} · ${err.category}` :
                                   "vision: MediaPipe hands · ArUco fretboard";
  ctx.restore();
  function dot(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); }
}

// ---- helpers ---------------------------------------------------------------
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

// ---- boot ------------------------------------------------------------------
let HAS_VIDEO=false;
const eng = new MockEngine(handle);
window.eng = eng;
el("bTarget").onclick = ()=>eng.cmd("feel_target");
el("bMine").onclick   = ()=>eng.cmd("feel_mine");
el("bRewind").onclick = ()=>eng.cmd("rewind");
el("bPlay").onclick   = (e)=>{ eng.cmd("play"); e.target.textContent = eng.playing?"⏸ pause":"▶ play"; };

// optional real camera behind the overlay
navigator.mediaDevices?.getUserMedia({video:true}).then(s=>{
  const v=el("vid"); v.srcObject=s; HAS_VIDEO=true;
}).catch(()=>{ HAS_VIDEO=false; });

let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  eng.step(dt);
  if(state.error && now>state.errorUntil){ state.error=null; clearCorrection(); }
  drawBody(); drawHighway(eng.t); drawCam(eng.t/1);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
