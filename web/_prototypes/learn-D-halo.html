<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tactus · Learn — Halo Arc</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --ivory:#FFFBF6; --ink:#3A2A4A; --berry:#FF4D8D; --line:#FBD9E6;
    --peach:#FFE3D1; --mint:#D6F7E6; --lav:#E7DBFF; --grape:#AD7FFF; --tangy:#FF9F43;
    --s1:#FF6B6B; --s2:#FF9F43; --s3:#FFD635; --s4:#26DEA0; --s5:#48B6FF; --s6:#AD7FFF;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:#FFFBF6;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .screen{ position:fixed; inset:0; }
  .hidden{ display:none !important; }

  /* ============ SHARED BRAND LOCKUP ============ */
  .brand{ display:inline-flex; align-items:center; gap:10px; }
  .brand .word{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:26px; letter-spacing:.01em; color:var(--ink); }
  .pill-learn{
    font-family:'Nunito',sans-serif; font-weight:900; font-size:12px; letter-spacing:.1em;
    background:linear-gradient(180deg,#FFD24D,#FF9F43); color:#7A3D00;
    padding:4px 11px; border-radius:999px; box-shadow:0 3px 0 #E07F1F, 0 5px 10px #ff9f4333;
  }

  /* ============ BUTTONS ============ */
  .btn{
    font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; cursor:pointer;
    border-radius:999px; border:2.5px solid #FFB8D4; background:#FFFFFFe6; color:#7A2A52;
    padding:14px 24px; box-shadow:0 4px 0 #FFD9E8, 0 8px 16px #ff4d8d1f;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #FFD9E8, 0 3px 8px #ff4d8d1f; }
  .btn-primary{
    background:linear-gradient(180deg,#FF6FA3,#FF4D8D); color:#fff; border-color:#FF8FB6;
    box-shadow:0 4px 0 #C9356C, 0 8px 16px #ff4d8d33;
  }
  .btn-primary:active{ box-shadow:0 1px 0 #C9356C, 0 3px 8px #ff4d8d33; }

  /* ============ (1) LANDING ============ */
  #landing{
    background:
      radial-gradient(900px 620px at 8% -6%, var(--peach) 0%, rgba(255,227,209,0) 60%),
      radial-gradient(820px 640px at 102% 14%, var(--lav) 0%, rgba(231,219,255,0) 58%),
      radial-gradient(1000px 780px at 88% 108%, var(--mint) 0%, rgba(214,247,230,0) 60%),
      radial-gradient(760px 560px at 18% 112%, #FFE9F1 0%, rgba(255,233,241,0) 62%),
      #FFFBF6;
  }
  .land-brand{ position:absolute; top:30px; left:38px; }
  .land-wrap{
    height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 28px;
  }
  .headline{
    font-family:'Fredoka',sans-serif; font-weight:700; line-height:1.02;
    font-size:clamp(46px,7vw,84px); color:var(--ink); letter-spacing:-.01em;
  }
  .headline .any{ color:var(--berry); position:relative; }
  .headline .any::after{
    content:""; position:absolute; left:2%; right:2%; bottom:.06em; height:.14em;
    background:linear-gradient(90deg,#FF9FBF,#FF4D8D); border-radius:999px; opacity:.55;
  }
  .sub{
    margin-top:20px; max-width:560px; font-size:19px; font-weight:600; line-height:1.45;
    color:#6B566F;
  }
  .input-group{
    margin-top:36px; display:flex; align-items:center; gap:12px;
    background:#FFFFFFf2; border:2.5px solid #FFCFE2; border-radius:999px;
    padding:7px 7px 7px 24px; box-shadow:0 6px 0 #FFE0EC, 0 14px 30px #ff4d8d18;
    width:min(620px,92vw);
  }
  .input-group input{
    flex:1; border:none; outline:none; background:transparent;
    font-family:'Nunito',sans-serif; font-size:17px; font-weight:600; color:var(--ink);
    min-width:0;
  }
  .input-group input::placeholder{ color:#C3A9C9; font-weight:600; }
  .input-group .btn-primary{ padding:14px 26px; white-space:nowrap; }
  .chips{ margin-top:24px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .chip{
    font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; cursor:pointer;
    border-radius:999px; border:2.5px solid #E7DBFF; background:#FFFFFFcc; color:#5A3E7A;
    padding:10px 18px; box-shadow:0 4px 0 #EDE3FF, 0 8px 16px #ad7fff1a;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .chip:active{ transform:translateY(3px); box-shadow:0 1px 0 #EDE3FF; }
  .chip:nth-child(2){ border-color:#BFEAFF; box-shadow:0 4px 0 #DCF3FF, 0 8px 16px #48b6ff1a; color:#2A5A7A; }
  .chip:nth-child(3){ border-color:#FFD9C2; box-shadow:0 4px 0 #FFE9DC, 0 8px 16px #ff9f431a; color:#7A4A2A; }
  .helper{ margin-top:22px; font-size:13.5px; font-weight:700; color:#A88FB0; letter-spacing:.01em; }

  /* ============ (2) GAME ============ */
  #game{ background:#1a1320; }
  #cam{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #fauxScene{ position:absolute; inset:0; width:100%; height:100%; z-index:0; }

  /* top gradient scrim so the arc + UI read */
  .top-scrim{
    position:absolute; top:0; left:0; right:0; height:42%;
    background:linear-gradient(180deg, rgba(26,16,32,.55) 0%, rgba(26,16,32,.18) 55%, rgba(26,16,32,0) 100%);
    z-index:1; pointer-events:none;
  }

  .game-brand{ position:absolute; top:22px; left:28px; z-index:6; }
  .game-brand .word{ color:#fff; text-shadow:0 2px 12px rgba(0,0,0,.4); }

  .top-right{ position:absolute; top:24px; right:28px; z-index:6; display:flex; gap:10px; align-items:center; }
  .status-pill{
    font-family:'Nunito',sans-serif; font-weight:800; font-size:13.5px; letter-spacing:.02em;
    display:inline-flex; align-items:center; gap:7px;
    background:rgba(38,222,160,.16); border:2px solid rgba(38,222,160,.55); color:#9DFBD9;
    padding:8px 14px; border-radius:999px; backdrop-filter:blur(6px);
    box-shadow:0 4px 16px rgba(38,222,160,.18);
  }
  .status-pill .dot{ width:8px; height:8px; border-radius:50%; background:#26DEA0; box-shadow:0 0 8px #26DEA0; animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.4; transform:scale(.7);} }
  .back-pill{
    font-family:'Nunito',sans-serif; font-weight:800; font-size:14px; cursor:pointer;
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.4); color:#fff;
    padding:8px 16px; border-radius:999px; backdrop-filter:blur(6px);
    transition:transform .08s ease, background .15s ease;
  }
  .back-pill:hover{ background:rgba(255,255,255,.24); }
  .back-pill:active{ transform:translateY(2px); }

  /* HALO ARC layer (top third) */
  #halo{ position:absolute; top:0; left:0; right:0; height:36%; z-index:4; pointer-events:none; }

  .bubble{
    position:absolute; transform:translate(-50%,-50%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fredoka',sans-serif; font-weight:700; color:#fff;
    border-radius:50%; will-change:left,top,transform;
  }
  .bubble .num{ text-shadow:0 1px 2px rgba(0,0,0,.35); }

  .strum-node{
    position:absolute; transform:translate(-50%,-50%);
    width:30px; height:30px; border-radius:50%;
    background:radial-gradient(circle at 50% 40%, #FF8FB6, #FF4D8D 70%);
    box-shadow:0 0 0 7px rgba(255,77,141,.22), 0 0 28px 6px rgba(255,77,141,.7);
    z-index:5;
  }
  .strum-ring{
    position:absolute; transform:translate(-50%,-50%);
    width:30px; height:30px; border-radius:50%; border:3px solid rgba(255,77,141,.9);
    pointer-events:none; opacity:0;
  }
  .chord-name{
    position:absolute; z-index:6;
    font-family:'Fredoka',sans-serif; font-weight:700; font-size:46px; color:#fff;
    text-shadow:0 2px 18px rgba(255,77,141,.6), 0 1px 3px rgba(0,0,0,.4);
    transform:translate(-50%,-50%);
  }
  .chord-sub{
    display:block; font-family:'Nunito',sans-serif; font-weight:800; font-size:13px;
    letter-spacing:.18em; color:#FFC6DD; margin-top:2px; text-shadow:0 1px 6px rgba(0,0,0,.4);
  }

  @keyframes burst{
    0%{ opacity:.9; transform:translate(-50%,-50%) scale(.6); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(3.4); }
  }
</style>
</head>
<body>

<!-- ============================================================= (1) LANDING -->
<section id="landing" class="screen">
  <div class="land-brand brand">
    <span class="word">TACTUS</span><span class="pill-learn">LEARN</span>
  </div>

  <div class="land-wrap">
    <h1 class="headline">Learn <span class="any">any</span> song.</h1>
    <p class="sub">Paste a link to your sheet music — we turn it into a live, on-your-guitar game.</p>

    <div class="input-group">
      <input id="link" type="text" placeholder="Paste a tab or MusicXML link…" />
      <button class="btn btn-primary" onclick="startGame()">Start →</button>
    </div>

    <div class="chips">
      <button class="chip" onclick="startGame()">🎸 Tactus Etude</button>
      <button class="chip" onclick="startGame()">🌧 Wonderwall</button>
      <button class="chip" onclick="startGame()">🥁 Seven Nation Army</button>
    </div>

    <p class="helper">works with Guitar Pro / MusicXML links</p>
  </div>
</section>

<!-- ============================================================= (2) GAME -->
<section id="game" class="screen hidden">
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="fauxScene"></canvas>
  <div class="top-scrim"></div>

  <div class="game-brand brand">
    <span class="word">TACTUS</span><span class="pill-learn">LEARN</span>
  </div>

  <div class="top-right">
    <span class="status-pill"><span class="dot"></span>auto-locked ✓</span>
    <button class="back-pill" onclick="backToLanding()">‹ back</button>
  </div>

  <!-- HALO ARC STAFF -->
  <div id="halo"></div>
</section>

<script>
/* ----------------------------------------------------------------- screens */
const landing = document.getElementById('landing');
const game = document.getElementById('game');
let rafId = null;

function startGame(){
  landing.classList.add('hidden');
  game.classList.remove('hidden');
  initCamera();
  startHalo();
}
function backToLanding(){
  game.classList.add('hidden');
  landing.classList.remove('hidden');
  stopHalo();
}

/* ----------------------------------------------------------------- camera + faux fallback */
function initCamera(){
  const video = document.getElementById('cam');
  const faux = document.getElementById('fauxScene');
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } })
      .then(s => { video.srcObject = s; faux.style.display='none'; })
      .catch(() => paintFaux());
  } else {
    paintFaux();
  }
}

function paintFaux(){
  const video = document.getElementById('cam');
  video.style.display = 'none';
  const c = document.getElementById('fauxScene');
  const ctx = c.getContext('2d');
  const W = c.width = window.innerWidth;
  const H = c.height = window.innerHeight;

  /* warm out-of-focus room */
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#3a2e3f'); g.addColorStop(.5,'#4a3b42'); g.addColorStop(1,'#2c2230');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  /* soft bokeh blobs */
  const blobs = [[0.15,0.30,90,'#6b5340'],[0.82,0.22,120,'#5a4b6b'],[0.70,0.62,140,'#6b4250'],
                 [0.30,0.78,110,'#40563f'],[0.92,0.85,100,'#7a5a3a'],[0.05,0.62,80,'#4a3b55']];
  blobs.forEach(([x,y,r,col])=>{
    const rg = ctx.createRadialGradient(x*W,y*H,0,x*W,y*H,r);
    rg.addColorStop(0,col+'88'); rg.addColorStop(1,col+'00');
    ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(x*W,y*H,r,0,Math.PI*2); ctx.fill();
  });

  /* head/shoulders silhouette near TOP-CENTER (player's face) */
  ctx.save();
  ctx.fillStyle = 'rgba(20,14,24,0.72)';
  const cx = W*0.5, headTop = H*0.05, headR = W*0.052;
  ctx.beginPath(); ctx.arc(cx, headTop+headR, headR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx-headR*2.6, H*0.30);
  ctx.quadraticCurveTo(cx-headR*1.7, H*0.17, cx, H*0.165);
  ctx.quadraticCurveTo(cx+headR*1.7, H*0.17, cx+headR*2.6, H*0.30);
  ctx.lineTo(cx+headR*2.6, H*0.34); ctx.lineTo(cx-headR*2.6, H*0.34);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  /* ---------- stylized GUITAR NECK crossing the LOWER THIRD at a slight angle ---------- */
  const nutX = W*0.12, nutY = H*0.92;       /* nut lower-left */
  const endX = W*0.96, endY = H*0.66;       /* heel upper-right */
  const ang = Math.atan2(endY-nutY, endX-nutX);
  const perp = ang + Math.PI/2;
  const neckLen = Math.hypot(endX-nutX, endY-nutY);
  const halfNutW = H*0.085, halfEndW = H*0.115;   /* fretboard widens toward body */

  function edge(t, side){
    const x = nutX + (endX-nutX)*t;
    const y = nutY + (endY-nutY)*t;
    const w = halfNutW + (halfEndW-halfNutW)*t;
    return [ x + Math.cos(perp)*w*side, y + Math.sin(perp)*w*side ];
  }

  /* fretboard slab */
  const [aX,aY]=edge(0,1),[bX,bY]=edge(0,-1),[cX,cY]=edge(1,-1),[dX,dY]=edge(1,1);
  const wg = ctx.createLinearGradient(aX,aY,cX,cY);
  wg.addColorStop(0,'#4a2f22'); wg.addColorStop(.5,'#5c3a27'); wg.addColorStop(1,'#3e2619');
  ctx.fillStyle = wg;
  ctx.beginPath(); ctx.moveTo(aX,aY); ctx.lineTo(bX,bY); ctx.lineTo(cX,cY); ctx.lineTo(dX,dY); ctx.closePath(); ctx.fill();

  /* sheen */
  ctx.save(); ctx.globalAlpha=.10; ctx.fillStyle='#fff';
  const [s1,s1y]=edge(0,.35),[s2,s2y]=edge(0,-.05),[s3,s3y]=edge(1,-.05),[s4,s4y]=edge(1,.35);
  ctx.beginPath(); ctx.moveTo(s1,s1y); ctx.lineTo(s2,s2y); ctx.lineTo(s3,s3y); ctx.lineTo(s4,s4y); ctx.closePath(); ctx.fill();
  ctx.restore();

  window.__neck = { nutX,nutY,endX,endY,perp,edge,neckLen };
  drawNeckGrid(ctx);
}

/* 6 colored strings + fret wires + glowing note cells, all in LOWER region */
function drawNeckGrid(ctx){
  const N = window.__neck; if(!N) return;
  const stringCols = ['#FF6B6B','#FF9F43','#FFD635','#26DEA0','#48B6FF','#AD7FFF']; /* e B G D A E */
  const offs = [-0.80,-0.48,-0.16,0.16,0.48,0.80]; /* fraction of half-width */

  /* fret wires */
  const frets = [0,0.13,0.27,0.42,0.58,0.74,0.90];
  ctx.save();
  frets.forEach((t,i)=>{
    const [x1,y1]=N.edge(t,1),[x2,y2]=N.edge(t,-1);
    if(i===0){ ctx.strokeStyle='rgba(245,235,220,0.92)'; ctx.lineWidth=7; }  /* nut */
    else { ctx.strokeStyle='rgba(212,200,180,0.78)'; ctx.lineWidth=3; }
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  /* inlay dots at fret 3 & 5 */
  ctx.fillStyle='rgba(255,250,240,0.5)';
  [0.345,0.66].forEach(t=>{ const [x,y]=N.edge(t,0); ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); });
  ctx.restore();

  /* helper: point at string s (0-5), along neck t */
  function pt(t,s){
    const x = N.nutX + (N.endX-N.nutX)*t;
    const y = N.nutY + (N.endY-N.nutY)*t;
    const halfNutW = (window.innerHeight)*0.085, halfEndW=(window.innerHeight)*0.115;
    const w = (halfNutW + (halfEndW-halfNutW)*t) * offs[s];
    return [ x+Math.cos(N.perp)*w, y+Math.sin(N.perp)*w ];
  }

  /* 6 colored string lines */
  ctx.save();
  for(let s=0;s<6;s++){
    const [x1,y1]=pt(0,s),[x2,y2]=pt(1,s);
    ctx.strokeStyle=stringCols[s]; ctx.lineWidth=2.4+s*0.35; ctx.globalAlpha=.92;
    ctx.shadowColor=stringCols[s]; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.restore();

  /* 3 glowing AR note cells (rounded rects in string colour, fret number inside) */
  const cells = [ {t:0.205,s:5,fret:'3'}, {t:0.345,s:4,fret:'2'}, {t:0.345,s:1,fret:'0'} ];
  cells.forEach(c=>{
    const [x,y]=pt(c.t,c.s);
    const col = stringCols[c.s];
    ctx.save();
    ctx.translate(x,y); ctx.rotate(Math.atan2(N.endY-N.nutY,N.endX-N.nutX));
    const w=46,h=30,r=10;
    ctx.shadowColor=col; ctx.shadowBlur=22;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(-w/2+r,-h/2); ctx.arcTo(w/2,-h/2,w/2,h/2,r); ctx.arcTo(w/2,h/2,-w/2,h/2,r);
    ctx.arcTo(-w/2,h/2,-w/2,-h/2,r); ctx.arcTo(-w/2,-h/2,w/2,-h/2,r); ctx.closePath();
    ctx.globalAlpha=.92; ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.fillStyle='#fff'; ctx.font='700 18px Fredoka, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(c.fret,0,1);
    ctx.restore();
  });
}

window.addEventListener('resize', ()=>{
  if(!game.classList.contains('hidden') && document.getElementById('cam').style.display==='none'){
    paintFaux();
  }
});

/* ----------------------------------------------------------------- HALO ARC STAFF */
/* notes ride a gentle upward arc hugging the TOP, flowing right->left toward a
   glowing berry STRUM POINT at the LEFT end where they fire. */

const halo = document.getElementById('halo');
const STRING_COLS = ['#FF6B6B','#FF9F43','#FFD635','#26DEA0','#48B6FF','#AD7FFF']; // e B G D A E
const STRING_NAMES = ['e','B','G','D','A','E'];

/* fake looping song: chords G, Em, C, D — each = stack of string bubbles (string idx 0-5, fret) */
const SONG = [
  { name:'G',  notes:[[5,'3'],[4,'2'],[0,'3']] },
  { name:'Em', notes:[[4,'2'],[3,'2']] },
  { name:'C',  notes:[[4,'3'],[3,'2'],[1,'1']] },
  { name:'D',  notes:[[3,'0'],[2,'2'],[1,'3'],[0,'2']] },
];

let arc = null;          // {ax,ay, cx,cy, bx,by} quadratic control pts, left->right
let chordEls = [];       // active chord groups riding the arc
let strumNode, strumNameEl;
let lastTs = 0;
let spawnClock = 0;
let songIdx = 0;

function layoutArc(){
  const W = halo.clientWidth || window.innerWidth;
  const H = halo.clientHeight || window.innerHeight*0.36;
  // arc endpoints: LEFT strum point + RIGHT entry, bowing UP over the head
  arc = {
    ax: W*0.13, ay: H*0.62,                 // left / strum end
    cx: W*0.52, cy: H*0.16,                 // control (top of bow)
    bx: W*0.97, by: H*0.50,                 // right / entry end
  };
}

/* quadratic bezier point + tangent at param u (0=left strum, 1=right entry) */
function arcAt(u){
  const {ax,ay,cx,cy,bx,by} = arc;
  const mu = 1-u;
  const x = mu*mu*ax + 2*mu*u*cx + u*u*bx;
  const y = mu*mu*ay + 2*mu*u*cy + u*u*by;
  return {x,y};
}

function buildHalo(){
  halo.innerHTML = '';
  layoutArc();

  // draw the arc rail (SVG) as a soft guide
  const W = halo.clientWidth || window.innerWidth;
  const H = halo.clientHeight || window.innerHeight*0.36;
  const svgns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgns,'svg');
  svg.setAttribute('width','100%'); svg.setAttribute('height','100%');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.style.position='absolute'; svg.style.inset='0';
  const defs=document.createElementNS(svgns,'defs');
  defs.innerHTML=`<linearGradient id="railg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF4D8D" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#FFD635" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#48B6FF" stop-opacity="0.35"/>
    </linearGradient>`;
  svg.appendChild(defs);
  const path=document.createElementNS(svgns,'path');
  path.setAttribute('d',`M ${arc.ax} ${arc.ay} Q ${arc.cx} ${arc.cy} ${arc.bx} ${arc.by}`);
  path.setAttribute('fill','none'); path.setAttribute('stroke','url(#railg)');
  path.setAttribute('stroke-width','3'); path.setAttribute('stroke-linecap','round');
  path.setAttribute('stroke-dasharray','2 9'); path.setAttribute('opacity','0.7');
  svg.appendChild(path);
  halo.appendChild(svg);

  // strum point node at left end
  strumNode=document.createElement('div');
  strumNode.className='strum-node';
  strumNode.style.left=arc.ax+'px'; strumNode.style.top=arc.ay+'px';
  halo.appendChild(strumNode);

  // floating chord name near strum point
  strumNameEl=document.createElement('div');
  strumNameEl.className='chord-name';
  strumNameEl.style.left=(arc.ax+6)+'px'; strumNameEl.style.top=(arc.ay+58)+'px';
  strumNameEl.innerHTML=`G<span class="chord-sub">STRUM</span>`;
  halo.appendChild(strumNameEl);

  chordEls = [];
  songIdx = 0; spawnClock = 0;
}

function spawnChord(chord){
  const group={ chord, u:1.0, els:[], fired:false };
  chord.notes.forEach((n,i)=>{
    const [sIdx,fret]=n;
    const el=document.createElement('div');
    el.className='bubble';
    const sz = 40 - i*1.5;        // slight stack scale
    el.style.width=sz+'px'; el.style.height=sz+'px';
    el.style.fontSize=(sz*0.46)+'px';
    const col=STRING_COLS[sIdx];
    el.style.background=`radial-gradient(circle at 50% 35%, ${tint(col)} , ${col} 72%)`;
    el.style.boxShadow=`0 0 16px 2px ${col}aa, inset 0 -2px 6px rgba(0,0,0,.25)`;
    el.style.border=`2px solid ${col}`;
    el.innerHTML=`<span class="num">${fret}</span>`;
    el.dataset.stack=i;   // stack offset index
    halo.appendChild(el);
    group.els.push(el);
  });
  chordEls.push(group);
}

function tint(hex){
  // lighten a hex toward white for the bubble highlight
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const mix=(c)=>Math.round(c+(255-c)*0.55);
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function fireStrum(group){
  // burst ring at strum point
  const ring=document.createElement('div');
  ring.className='strum-ring';
  ring.style.left=arc.ax+'px'; ring.style.top=arc.ay+'px';
  ring.style.animation='burst .55s ease-out forwards';
  halo.appendChild(ring);
  setTimeout(()=>ring.remove(),600);
  // strum node flash
  strumNode.animate([{transform:'translate(-50%,-50%) scale(1.5)'},{transform:'translate(-50%,-50%) scale(1)'}],{duration:380,easing:'ease-out'});
  // update floating chord name
  strumNameEl.innerHTML=`${group.chord.name}<span class="chord-sub">STRUM</span>`;
  strumNameEl.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.8)'},{opacity:1,transform:'translate(-50%,-50%) scale(1)'}],{duration:300,easing:'ease-out'});
}

function tick(ts){
  if(!lastTs) lastTs=ts;
  const dt=Math.min(50, ts-lastTs); lastTs=ts;

  // spawn cadence
  spawnClock -= dt;
  if(spawnClock<=0){
    spawnChord(SONG[songIdx % SONG.length]);
    songIdx++;
    spawnClock = 1900;   // ms between chords
  }

  const SPEED = 0.00021; // u per ms (right->left, so we subtract)
  for(let gi=chordEls.length-1; gi>=0; gi--){
    const grp=chordEls[gi];
    grp.u -= SPEED*dt;

    grp.els.forEach((el,i)=>{
      const u=Math.max(0,grp.u);
      const p=arcAt(u);
      // stack chord bubbles slightly perpendicular to arc (vertical-ish offset)
      const stackOff = (i - (grp.els.length-1)/2) * 13;
      el.style.left=p.x+'px';
      el.style.top=(p.y+stackOff)+'px';
      // fade in at entry, slight scale near strum
      const op = u>0.92 ? (1-(u-0.92)/0.08) : 1;
      const sc = u<0.10 ? 1+(0.10-u)*1.6 : 1;
      el.style.opacity=Math.max(0,Math.min(1,op));
      el.style.transform=`translate(-50%,-50%) scale(${sc})`;
    });

    // fire when reaching strum point
    if(grp.u<=0.02 && !grp.fired){ grp.fired=true; fireStrum(grp); }
    if(grp.u<=-0.04){
      grp.els.forEach(el=>el.remove());
      chordEls.splice(gi,1);
    }
  }
  rafId=requestAnimationFrame(tick);
}

function startHalo(){
  buildHalo();
  lastTs=0;
  // seed one chord immediately so the screenshot reads as alive
  spawnChord(SONG[0]); songIdx=1; spawnClock=1900;
  chordEls[0].u=0.34; // place mid-arc for the static frame
  rafId=requestAnimationFrame(tick);
}
function stopHalo(){
  if(rafId) cancelAnimationFrame(rafId); rafId=null;
  halo.innerHTML='';
}

window.addEventListener('resize', ()=>{
  if(!game.classList.contains('hidden')){ buildHalo(); }
});
</script>
</body>
</html>
