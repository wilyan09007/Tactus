<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 545" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Tactus render chain</title>
  <desc id="d">Laptop AI brain to 2 Vantec USB adapters to 6 SK473 amp boxes to 12 de-housed drivers; power is a separate 5 V rail. 12 channels, no soldering.</desc>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
    <style>
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:12}
      .hd{font-weight:700;fill:#0f172a;font-size:16px}
      .sub{fill:#64748b;font-size:12.5px}
      .lab{fill:#475569;font-size:12px;font-style:italic}
      .flow{stroke:#94a3b8;stroke-width:2;fill:none}
      .title{font-weight:800;fill:#0f172a;font-size:20px}
      .stag{font-size:11px;font-weight:700;letter-spacing:.06em}
    </style>
  </defs>

  <text x="34" y="34" class="title">TACTUS — the render chain</text>
  <text x="34" y="55" class="sub">sense → understand → render · 12 channels · no soldering · the laptop is the brain</text>

  <!-- inputs -->
  <rect x="70" y="74" width="360" height="40" rx="12" class="card"/>
  <text x="250" y="99" text-anchor="middle" class="hd" font-size="14">🎸 guitar &#160;·&#160; 📷 webcam &#160;·&#160; 🎤 mic</text>
  <line x1="250" y1="114" x2="250" y2="142" class="flow" marker-end="url(#ah)"/>
  <text x="262" y="132" class="lab">vision + audio in</text>

  <!-- laptop -->
  <rect x="70" y="144" width="360" height="64" rx="12" class="card" stroke="#6366f1"/>
  <text x="86" y="170" class="stag" fill="#6366f1">AI BRAIN</text>
  <text x="86" y="190" class="hd">LAPTOP</text>
  <text x="250" y="172" text-anchor="middle" class="sub">transcribe · fuse (vision vs audio = the</text>
  <text x="250" y="190" text-anchor="middle" class="sub">mistake) · LLM coach · AR/UI</text>
  <line x1="250" y1="208" x2="250" y2="248" class="flow" marker-end="url(#ah)"/>
  <text x="262" y="232" class="lab">USB (data)</text>

  <!-- vantec -->
  <rect x="70" y="250" width="360" height="58" rx="12" class="card" stroke="#0ea5e9"/>
  <text x="86" y="274" class="stag" fill="#0ea5e9">AUDIO SOURCE</text>
  <text x="86" y="296" class="hd">2× Vantec NBA-200U 7.1 <tspan class="sub" font-weight="400">(CM6206)</tspan></text>
  <text x="414" y="274" text-anchor="end" class="sub">both used · V3 = spare</text>
  <text x="414" y="296" text-anchor="end" class="sub">4 stereo jacks each = 8 ch</text>
  <line x1="250" y1="308" x2="250" y2="346" class="flow" marker-end="url(#ah)"/>
  <text x="262" y="331" class="lab">3.5 mm stereo plug = 2 ch</text>

  <!-- sk473 -->
  <rect x="70" y="348" width="360" height="58" rx="12" class="card" stroke="#14b8a6"/>
  <text x="86" y="372" class="stag" fill="#14b8a6">AMPS (USED INTACT)</text>
  <text x="86" y="394" class="hd">6× SK473 box — PAM8403</text>
  <text x="414" y="372" text-anchor="end" class="sub">1 board = 2 ch</text>
  <text x="414" y="394" text-anchor="end" class="sub">→ 12 channels</text>
  <line x1="250" y1="406" x2="250" y2="444" class="flow" marker-end="url(#ah)"/>
  <text x="262" y="429" class="lab">factory 2-wire · no solder</text>

  <!-- drivers -->
  <rect x="70" y="446" width="360" height="58" rx="12" class="card" stroke="#f59e0b"/>
  <text x="86" y="470" class="stag" fill="#d97706">ACTUATORS (FELT)</text>
  <text x="86" y="492" class="hd">12× KHD Ø52 mm 4Ω drivers</text>
  <text x="414" y="470" text-anchor="end" class="sub">de-housed</text>
  <text x="414" y="492" text-anchor="end" class="sub">6 back + 6 torso</text>

  <!-- power sidebar -->
  <rect x="566" y="250" width="262" height="156" rx="12" class="card" stroke="#22c55e"/>
  <text x="586" y="274" class="stag" fill="#16a34a">POWER · 5 V (SEPARATE)</text>
  <text x="586" y="298" class="hd" font-size="15">Carries no audio</text>
  <text x="586" y="322" class="sub">Mode A — 10-port hub (wall)</text>
  <text x="586" y="342" class="sub">Mode B — Anker 737 (battery)</text>
  <text x="586" y="366" class="sub">→ each SK473 USB-A lead</text>
  <text x="586" y="390" class="sub">one source at a time (docs/03)</text>
  <line x1="566" y1="377" x2="434" y2="377" class="flow" marker-end="url(#ah)"/>
  <text x="498" y="369" text-anchor="middle" class="lab">5 V</text>

  <!-- footnote -->
  <rect x="34" y="516" width="792" height="0.6" fill="#e2e8f0"/>
  <text x="34" y="537" class="sub">Audio (3.5 mm line-level) and power (5 V) never share a wire; one shared signal ground only. Source of truth: <tspan font-weight="700" fill="#0f172a">config/channel_map.json</tspan></text>
</svg>
