<svg width="100%" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
  <title>tactus body encoding map</title>
  <rect x="0" y="0" width="700" height="560" fill="#ffffff"/>
  <text x="20" y="30" font-size="18" font-weight="600" fill="#111827">body map — string + fret encoding (14 sites)</text>
  <text x="20" y="52" font-size="12" fill="#6b7280">note = one chest actuator (string) + one fret-zone (fret + intensity), fired as a short pulse</text>

  <!-- torso outline -->
  <rect x="250" y="80" width="200" height="240" rx="40" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="350" y="100" font-size="12" text-anchor="middle" fill="#6b7280">chest = STRING axis</text>
  <!-- 6 string actuators down the chest -->
  <g font-size="11" fill="#111827" text-anchor="middle">
    <circle cx="350" cy="120" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="124">1</text><text x="420" y="124" text-anchor="start" fill="#374151">high E</text>
    <circle cx="350" cy="155" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="159">2</text><text x="420" y="159" text-anchor="start" fill="#374151">B</text>
    <circle cx="350" cy="190" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="194">3</text><text x="420" y="194" text-anchor="start" fill="#374151">G</text>
    <circle cx="350" cy="225" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="229">4</text><text x="420" y="229" text-anchor="start" fill="#374151">D</text>
    <circle cx="350" cy="260" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="264">5</text><text x="420" y="264" text-anchor="start" fill="#374151">A</text>
    <circle cx="350" cy="295" r="13" fill="#cfe0fc" stroke="#93b4f0"/><text x="350" y="299">6</text><text x="420" y="299" text-anchor="start" fill="#374151">low E</text>
  </g>

  <!-- forearm = fret zones -->
  <rect x="40" y="360" width="620" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="50" y="380" font-size="12" fill="#6b7280">fretting forearm + upper back = FRET axis (zone + intensity)</text>
  <g font-size="11" fill="#111827" text-anchor="middle">
    <circle cx="90"  cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="90"  y="412">z1</text>
    <circle cx="170" cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="170" y="412">z2</text>
    <circle cx="250" cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="250" y="412">z3</text>
    <circle cx="330" cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="330" y="412">z4</text>
    <circle cx="410" cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="410" y="412">z5</text>
    <circle cx="490" cy="408" r="13" fill="#d9ead3" stroke="#9ed3b0"/><text x="490" y="412">z6</text>
    <circle cx="570" cy="408" r="13" fill="#ffe2b8" stroke="#e6b870"/><text x="570" y="412">z7</text>
    <circle cx="640" cy="408" r="13" fill="#ffe2b8" stroke="#e6b870"/><text x="640" y="412">z8</text>
  </g>
  <text x="270" y="446" font-size="11" fill="#6b7280">z1–z6 forearm (near nut → elbow)</text>
  <text x="540" y="446" font-size="11" fill="#6b7280">z7–z8 upper back (reserved)</text>

  <!-- fret mapping -->
  <rect x="20" y="466" width="660" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="36" y="490" font-size="13" font-weight="600" fill="#111827">12 frets → 8 zones via intensity</text>
  <text x="36" y="512" font-size="12" fill="#374151">frets 1–2 → z1 (low/high) · 3–4 → z2 · 5–6 → z3 · 7–8 → z4 · 9–10 → z5 · 11–12 → z6</text>
  <text x="36" y="532" font-size="12" fill="#374151">fret 0 = double-tap the string actuator only · adjacent frets differ by zone or intensity = feelable</text>
</svg>
