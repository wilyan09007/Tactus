<svg width="100%" viewBox="0 0 700 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
  <title>tactus power modes and chord-safety</title>
  <defs><marker id="ar2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/></marker></defs>
  <rect x="0" y="0" width="700" height="470" fill="#ffffff"/>
  <text x="20" y="30" font-size="18" font-weight="600" fill="#111827">power — two modes, chord-safe</text>

  <!-- Mode A -->
  <rect x="20" y="50" width="320" height="190" rx="8" fill="#e6f4ea" stroke="#9ed3b0"/>
  <text x="36" y="76" font-size="15" font-weight="600" fill="#111827">Mode A — wall (recommended)</text>
  <rect x="40" y="90" width="120" height="46" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="100" y="111" font-size="12" text-anchor="middle" fill="#111827">wall outlet</text><text x="100" y="127" font-size="10.5" text-anchor="middle" fill="#6b7280">→ 10-port hub</text>
  <line x1="160" y1="113" x2="196" y2="113" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="200" y="90" width="120" height="46" rx="6" fill="#ffe2b8" stroke="#e6b870"/><text x="260" y="111" font-size="12" text-anchor="middle" fill="#111827">hub 10A / 50W</text><text x="260" y="127" font-size="10.5" text-anchor="middle" fill="#6b7280">5V to 7 amps</text>
  <text x="36" y="165" font-size="12" fill="#111827">worst-case chord: 7 × 0.95A = 6.6A (33W)</text>
  <text x="36" y="185" font-size="12" fill="#111827">hub supplies 50W → 34%+ headroom</text>
  <rect x="36" y="200" width="288" height="28" rx="6" fill="#cae7d4" stroke="#9ed3b0"/>
  <text x="180" y="219" font-size="12.5" text-anchor="middle" font-weight="600" fill="#0f5132">cannot collapse — chords 100% safe</text>

  <!-- Mode B -->
  <rect x="360" y="50" width="320" height="190" rx="8" fill="#fff4e5" stroke="#e6c089"/>
  <text x="376" y="76" font-size="15" font-weight="600" fill="#111827">Mode B — cordless (the wow)</text>
  <rect x="380" y="90" width="130" height="46" rx="6" fill="#ffffff" stroke="#cbd5e1"/><text x="445" y="111" font-size="12" text-anchor="middle" fill="#111827">Anker 737</text><text x="445" y="127" font-size="10.5" text-anchor="middle" fill="#6b7280">24000mAh · 140W</text>
  <line x1="510" y1="113" x2="546" y2="113" stroke="#6b7280" stroke-width="1.5" marker-end="url(#ar2)"/>
  <rect x="550" y="90" width="120" height="46" rx="6" fill="#ffe2b8" stroke="#e6b870"/><text x="610" y="111" font-size="12" text-anchor="middle" fill="#111827">2 solder buses</text><text x="610" y="127" font-size="10.5" text-anchor="middle" fill="#6b7280">5V rails → amps</text>
  <text x="376" y="165" font-size="12" fill="#111827">per-port 5V limit ≈ 3A (15W)</text>
  <text x="376" y="185" font-size="12" fill="#111827">split 7 amps 3/2/2 across 3 ports</text>
  <rect x="376" y="200" width="288" height="28" rx="6" fill="#fde6c4" stroke="#e6c089"/>
  <text x="520" y="219" font-size="12.5" text-anchor="middle" font-weight="600" fill="#7a4f0a">≤2.2A/port → safe · ~4h runtime</text>

  <!-- rules -->
  <rect x="20" y="260" width="660" height="190" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="36" y="286" font-size="14" font-weight="600" fill="#111827">hard rules (never break)</text>
  <text x="36" y="312" font-size="12.5" fill="#374151">1.  audio and power never share a wire — only 3.5mm signal links laptop ↔ amps</text>
  <text x="36" y="336" font-size="12.5" fill="#374151">2.  polarity strict: 5V↔5V, GND↔GND — never short 5V to GND (trips the bank)</text>
  <text x="36" y="360" font-size="12.5" fill="#374151">3.  power amps from hub or bank only — never the Pi or laptop USB ports</text>
  <text x="36" y="384" font-size="12.5" fill="#374151">4.  volume knobs ~50–60% — felt haptics need ~1W/ch; cranking wastes power + risks 40mm</text>
  <text x="36" y="408" font-size="12.5" fill="#374151">5.  vent the enclosure — amps run warm</text>
  <text x="36" y="434" font-size="12" fill="#6b7280">per channel ≈ 0.5–1W felt · pulses are short (30–80ms) so a chord is a brief peak</text>
</svg>
